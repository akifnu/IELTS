<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>German Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:#1565c0; --blue-dark:#0d47a1; --blue-light:#e3f2fd; --blue-soft:#bbdefb;
      --bg:#f8fbff; --white:#fff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
      --danger:#dc2626; --warn:#f59e0b; --shadow:0 4px 24px rgba(21,101,192,.08); --radius:18px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}
    #splash{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;transition:opacity .6s,visibility .6s}
    #splash.hide{opacity:0;visibility:hidden;pointer-events:none;display:none}
    #splash{cursor:pointer}
    .splash-skip{position:relative;z-index:2;margin-top:28px;padding:12px 28px;font-size:.9rem;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.8);border-radius:999px;cursor:pointer}
    .splash-skip:hover{background:rgba(255,255,255,.3)}
    #splash .bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=1200&q=80') center/cover;animation:kenburns 2s ease forwards}
    #splash .overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,71,161,.5),rgba(21,101,192,.8))}
    @keyframes kenburns{to{transform:scale(1.02)}}
    .splash-content{position:relative;z-index:1;text-align:center;color:#fff;padding:32px;animation:fadeUp .8s ease}
    .splash-content .greeting{font-size:1rem;letter-spacing:.12em;text-transform:uppercase;opacity:.9}
    .splash-content h1{font-size:2.2rem;font-weight:700;margin-top:12px}
    .splash-content p{margin-top:10px;opacity:.85}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
    header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
    header h1{font-size:1.1rem;font-weight:600;flex:1;color:var(--blue-dark)}
    .icon-btn{background:var(--blue-light);border:none;border-radius:12px;color:var(--blue);font-size:1rem;padding:8px 12px;cursor:pointer}
    main{padding:16px 16px 96px}
    .deck-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;cursor:pointer;position:relative}
    .deck-card h2{font-size:1.05rem;color:var(--blue-dark)}
    .deck-card p{color:var(--muted);font-size:.88rem;margin-top:4px}
    .deck-card .meta{display:flex;gap:12px;margin-top:10px;font-size:.78rem;font-weight:600}
    .deck-card .due{color:var(--blue)} .deck-card .next{color:var(--muted)}
    .deck-card .delete{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--danger);cursor:pointer}
    .fab{position:fixed;right:20px;bottom:24px;width:56px;height:56px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:1.8rem;cursor:pointer;box-shadow:0 6px 20px rgba(21,101,192,.35)}
    .deck-tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:4px}
    .deck-tabs button{flex:1;border:none;background:none;padding:10px 6px;border-radius:10px;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer}
    .deck-tabs button.active{background:var(--blue);color:#fff}
    .btn-primary{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:14px;font-weight:600;cursor:pointer;margin-bottom:10px}
    .btn-outline{width:100%;padding:14px;background:var(--white);color:var(--blue);border:2px solid var(--blue);border-radius:14px;font-weight:600;cursor:pointer;margin-bottom:10px}
    .btn-warn{width:100%;padding:12px;background:#fff7ed;color:#c2410c;border:1px solid #fdba74;border-radius:12px;font-weight:600;cursor:pointer;margin-top:8px}
    .btn-danger-sm{padding:8px 12px;background:#fef2f2;color:var(--danger);border:1px solid #fecaca;border-radius:10px;font-size:.8rem;font-weight:600;cursor:pointer}
    .card-item{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
    .card-item .en{font-weight:600} .card-item .de{color:var(--blue);margin-top:4px;font-size:1.05rem}
    .card-actions{text-align:right;margin-top:8px}
    .card-actions button{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 8px}
    .cal-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
    .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .cal-header button{background:var(--blue-light);border:none;color:var(--blue);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:1.1rem}
    .cal-header h2{font-size:1rem;color:var(--blue-dark)}
    .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:.68rem;font-weight:700;color:var(--muted);margin-bottom:6px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .cal-day{min-height:52px;border:1px solid var(--border);border-radius:10px;background:var(--bg);padding:4px;cursor:pointer;text-align:left;display:flex;flex-direction:column}
    .cal-day.blank{border:none;background:transparent;cursor:default}
    .cal-day .num{font-size:.75rem;font-weight:600;padding:2px 4px}
    .cal-day.today{border-color:var(--blue);background:var(--blue-light)}
    .cal-day.selected{border-color:var(--blue-dark);box-shadow:0 0 0 2px var(--blue-soft)}
    .cal-day.overload{border-color:var(--danger);background:#fef2f2}
    .cal-day .sess{font-size:.6rem;background:var(--blue);color:#fff;border-radius:4px;padding:2px 4px;margin-top:auto;line-height:1.2}
    .cal-day .sess.manual{background:#64748b}
    .cal-day .sess.done{opacity:.45;text-decoration:line-through}
    .cal-legend{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0;font-size:.72rem;color:var(--muted)}
    .cal-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px}
    .day-panel{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:12px}
    .day-panel h3{font-size:.92rem;color:var(--blue-dark);margin-bottom:10px}
    .session-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.85rem}
    .session-row:last-child{border:none}
    .algo-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
    .algo-section h3{font-size:.92rem;color:var(--blue-dark);margin-bottom:12px}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:4px}
    .field input,.field textarea,.field select{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;font:inherit}
    .field small{display:block;color:var(--muted);font-size:.72rem;margin-top:4px;line-height:1.4}
    .formula{background:var(--blue-light);border-radius:10px;padding:12px;font-size:.78rem;color:var(--blue-dark);line-height:1.5;margin-top:8px;font-family:ui-monospace,monospace}
    .overload-box{background:#fff7ed;border:1px solid #fdba74;border-radius:var(--radius);padding:14px;margin-bottom:12px}
    .overload-box h3{color:#c2410c;font-size:.9rem;margin-bottom:6px}
    .flip-card{perspective:1000px;min-height:250px;margin:16px 0;cursor:pointer}
    .flip-inner{position:relative;height:250px;transition:transform .5s;transform-style:preserve-3d}
    .flip-card.flipped .flip-inner{transform:rotateY(180deg)}
    .flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-size:1.25rem;border:1px solid var(--border);box-shadow:var(--shadow)}
    .flip-front{background:var(--white)} .flip-back{background:var(--blue-light);color:var(--blue-dark);transform:rotateY(180deg)}
    .progress-row{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:8px}
    .progress-bar{height:6px;background:var(--border);border-radius:3px;margin-bottom:18px;overflow:hidden}
    .progress-bar>div{height:100%;background:var(--blue);transition:width .3s}
    .study-actions{display:flex;gap:10px}
    .study-actions button{flex:1;padding:14px;border-radius:14px;font-weight:600;cursor:pointer;border:none}
    .missed{background:var(--white);border:2px solid var(--border)!important}
    .got-it{background:var(--blue);color:#fff}
    .show-answer{width:100%;padding:14px;background:var(--white);border:2px solid var(--blue);color:var(--blue);border-radius:14px;font-weight:600;cursor:pointer}
    .empty{text-align:center;padding:40px 20px;color:var(--muted)}
    .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:300}
    .modal{background:var(--white);border-radius:var(--radius);padding:22px;width:100%;max-width:400px}
    .modal h2{margin-bottom:14px;color:var(--blue-dark)}
    .modal input,.modal textarea{width:100%;padding:11px;margin-bottom:10px;border:1px solid var(--border);border-radius:10px;font:inherit}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
    .modal-actions button{padding:10px 16px;border-radius:10px;border:none;font-weight:600;cursor:pointer}
    .cancel{background:var(--bg);color:var(--muted)} .confirm{background:var(--blue);color:#fff}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:20}
    .bottom-nav button{flex:1;background:none;border:none;padding:10px;color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
    .bottom-nav button.active{color:var(--blue)}
    .bottom-nav .ni{font-size:1.2rem}
    .fab{bottom:88px}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
    .toggle-row strong{font-size:.9rem}
    .toggle-row small{display:block;color:var(--muted);font-size:.75rem;margin-top:2px;font-weight:400}
    .toggle{position:relative;width:48px;height:28px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle span{position:absolute;inset:0;background:#cbd5e1;border-radius:14px;cursor:pointer;transition:.2s}
    .toggle span::after{content:'';position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
    .toggle input:checked+span{background:var(--blue)}
    .toggle input:checked+span::after{transform:translateX(20px)}
    .badge-ebb{font-size:.68rem;background:var(--blue-light);color:var(--blue);padding:2px 8px;border-radius:20px;font-weight:600;margin-left:6px}
    .cal-day .sess.deck{font-size:.55rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .settings-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
    .settings-card>h3{font-size:.95rem;color:var(--blue-dark);margin-bottom:4px}
    .settings-card>.hint{font-size:.8rem;color:var(--muted);margin-bottom:14px;line-height:1.4}
    .mode-pick{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .mode-opt{border:2px solid var(--border);border-radius:14px;padding:14px 12px;cursor:pointer;background:var(--bg);text-align:left;transition:.15s}
    .mode-opt.active{border-color:var(--blue);background:var(--blue-light)}
    .mode-opt .mo-icon{font-size:1.4rem;margin-bottom:6px}
    .mode-opt strong{display:block;font-size:.88rem;margin-bottom:4px}
    .mode-opt span{font-size:.75rem;color:var(--muted);line-height:1.35}
    .preset-row{display:flex;gap:8px;margin-top:14px}
    .preset-btn{flex:1;padding:11px 6px;border:1px solid var(--border);border-radius:12px;background:var(--white);font-size:.78rem;font-weight:600;cursor:pointer;color:var(--text)}
    .preset-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    details.advanced{margin-top:14px;border-top:1px solid var(--border);padding-top:8px}
    details.advanced summary{cursor:pointer;font-weight:600;font-size:.85rem;color:var(--blue);padding:8px 0;list-style:none}
    details.advanced summary::-webkit-details-marker{display:none}
    .stepper{display:flex;align-items:center;gap:12px;margin-top:8px}
    .stepper button{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--white);font-size:1.2rem;cursor:pointer;color:var(--blue)}
    .stepper .val{font-size:1.1rem;font-weight:700;min-width:2rem;text-align:center}
    .algo-pick{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
    .algo-opt{border:2px solid var(--border);border-radius:12px;padding:12px;background:var(--bg);cursor:pointer;text-align:left;width:100%}
    .algo-opt.active{border-color:var(--blue);background:var(--blue-light)}
    .algo-opt strong{font-size:.88rem;display:block}
    .algo-opt span{font-size:.75rem;color:var(--muted)}
    .color-pick{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
    .color-swatch{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);cursor:pointer}
    .color-swatch.active{border-color:var(--blue-dark);box-shadow:0 0 0 2px var(--blue)}
    .color-swatch.none{background:repeating-linear-gradient(45deg,#eee,#eee 4px,#fff 4px,#fff 8px)}
    .card-meta{font-size:.72rem;color:var(--muted);margin-top:8px}
    .schedule-fold{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
    .schedule-fold summary{cursor:pointer;padding:12px 14px;font-size:.85rem;font-weight:600;color:var(--blue-dark);list-style:none;display:flex;align-items:center;justify-content:space-between}
    .schedule-fold summary::-webkit-details-marker{display:none}
    .schedule-fold summary::after{content:'▾';color:var(--muted);font-size:.9rem;transition:transform .2s}
    .schedule-fold[open] summary::after{transform:rotate(180deg)}
    .schedule-fold summary .sched-line{color:var(--muted);font-weight:500;font-size:.8rem}
    .schedule-fold .sched-body{padding:0 14px 14px;border-top:1px solid var(--border)}
    .schedule-fold .sched-body h3{font-size:.9rem;margin:14px 0 4px}
  </style>
</head>
<body>
  <div id="splash" role="button" tabindex="0" aria-label="Continue to app">
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="splash-content">
      <div class="greeting">Guten Tag</div>
      <h1 id="splash-name">Friend</h1>
      <p>German flashcards · Ebbinghaus, Leitner & SM-2</p>
      <button type="button" class="splash-skip" id="splash-continue">Continue</button>
    </div>
  </div>
  <div id="app"></div>
  <script>
    const STORAGE_KEY = 'german_flashcards_v4';
    const LEGACY_KEYS = ['german_flashcards_v3', 'german_flashcards_v2', 'german_flashcards_v1'];

    const CARD_COLORS = [
      { id: 'none', hex: '', border: 'var(--border)' },
      { id: 'blue', hex: '#e3f2fd', border: '#1565c0' },
      { id: 'green', hex: '#e8f5e9', border: '#2e7d32' },
      { id: 'yellow', hex: '#fff8e1', border: '#f9a825' },
      { id: 'pink', hex: '#fce4ec', border: '#c2185b' },
      { id: 'purple', hex: '#f3e5f5', border: '#7b1fa2' },
      { id: 'orange', hex: '#fff3e0', border: '#ef6c00' },
    ];

    const ALGORITHMS = {
      ebbinghaus: { label: 'Ebbinghaus', short: 'Ebb', desc: 'Forgetting curve — memory fades predictably over time' },
      leitner: { label: 'Leitner', short: 'Leitner', desc: 'Box system — cards move up on success, reset on miss' },
      sm2: { label: 'SM-2', short: 'SM-2', desc: 'SuperMemo 2 — adaptive ease factor (used by Anki)' },
    };

    const LEITNER_DAYS = [1, 2, 4, 7, 14];

    const PRESETS = {
      relaxed: { label: 'Relaxed', desc: 'Reviews spread further apart', intervals: [2, 4, 8, 16, 32, 64], retentionTarget: 0.85, failIntervalDays: 2 },
      normal: { label: 'Normal', desc: 'Balanced spacing', intervals: [1, 2, 4, 7, 15, 30, 60], retentionTarget: 0.9, failIntervalDays: 1 },
      intensive: { label: 'Intensive', desc: 'Review more frequently', intervals: [1, 1, 2, 4, 7, 14, 21], retentionTarget: 0.95, failIntervalDays: 1 },
    };

    const DEFAULT_ALGO = {
      enabled: false,
      algorithm: 'ebbinghaus',
      preset: 'normal',
      intervals: [1, 2, 4, 7, 15, 30, 60, 120],
      initialStability: 1.0,
      initialEase: 2.5,
      minEase: 1.3,
      maxEase: 3.0,
      easeBonus: 0.15,
      easePenalty: 0.25,
      retentionTarget: 0.9,
      maxSessionsPerDay: 1,
      failIntervalDays: 1,
      curveSteepness: 1.0,
    };

    const GERMAN_DECKS = [
      {
        id: 1, name: 'German Basics', description: 'Essential everyday German',
        cards: [
          { id: 1, en: 'Hello', de: 'Hallo' },
          { id: 2, en: 'Good day', de: 'Guten Tag' },
          { id: 3, en: 'Thank you', de: 'Danke' },
          { id: 4, en: 'Please', de: 'Bitte' },
          { id: 5, en: 'Yes / No', de: 'Ja / Nein' },
          { id: 6, en: 'Goodbye', de: 'Auf Wiedersehen' },
        ],
      },
      {
        id: 2, name: 'German Travel', description: 'At the hotel, train & airport',
        cards: [
          { id: 1, en: 'Where is the station?', de: 'Wo ist der Bahnhof?' },
          { id: 2, en: 'A ticket, please', de: 'Eine Fahrkarte, bitte' },
          { id: 3, en: 'I have a reservation', de: 'Ich habe eine Reservierung' },
          { id: 4, en: 'How much does it cost?', de: 'Was kostet das?' },
        ],
      },
      {
        id: 3, name: 'German Verbs', description: 'Common verbs & meanings',
        cards: [
          { id: 1, en: 'to be', de: 'sein' },
          { id: 2, en: 'to have', de: 'haben' },
          { id: 3, en: 'to go', de: 'gehen' },
          { id: 4, en: 'to eat', de: 'essen' },
          { id: 5, en: 'to speak', de: 'sprechen' },
        ],
      },
    ];

    let state = {
      view: 'home',
      tab: 'decks',
      deckId: null,
      study: null,
      modal: null,
      calMonth: new Date(),
      calSelected: null,
      scheduleDeckId: null,
      decks: [],
      algo: { ...DEFAULT_ALGO },
      globalMaxSessionsPerDay: 3,
      deckScheduleOpen: false,
      calSettingsOpen: false,
      userName: '',
      ready: false,
      splashDone: false,
    };

    try { state.userName = localStorage.getItem('flashcards_user') || ''; } catch (e) {}

    // ── Date helpers ──
    function todayStr() {
      const d = new Date();
      return fmt(d.getFullYear(), d.getMonth() + 1, d.getDate());
    }
    function fmt(y, m, d) { return `${y}-${pad(m)}-${pad(d)}`; }
    function pad(n) { return String(n).padStart(2, '0'); }
    function parseDate(s) { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }
    function addDaysStr(s, n) {
      const d = parseDate(s); d.setDate(d.getDate() + n);
      return fmt(d.getFullYear(), d.getMonth() + 1, d.getDate());
    }
    function formatDate(s) {
      return parseDate(s).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    }
    function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

    // ── Deck model ──
    function newDeckSR() {
      return { repetitions: 0, ease: DEFAULT_ALGO.initialEase, stability: DEFAULT_ALGO.initialStability, intervalDays: 0, lastReview: null };
    }
    function newScheduleEntry(date, source = 'auto') {
      return { id: Date.now() + Math.random(), date, source, completed: false };
    }

    function initCard(c) {
      return {
        id: c.id,
        en: c.en || c.front,
        de: c.de || c.back,
        color: c.color || null,
        leitnerBox: c.leitnerBox || 1,
        sm2: c.sm2 || { repetitions: 0, easeFactor: 2.5, intervalDays: 0 },
      };
    }

    function initDeck(d) {
      return {
        ...d,
        cards: (d.cards || []).map(initCard),
        sr: d.sr || newDeckSR(),
        schedule: d.schedule || [],
        ebbinghaus: d.ebbinghaus === true || (d.algo && d.algo.enabled === true),
        algo: { ...DEFAULT_ALGO, ...(d.algo || {}), enabled: d.ebbinghaus === true || (d.algo && d.algo.enabled === true) },
      };
    }

    function load() {
      try {
        let stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) {
          for (const k of LEGACY_KEYS) {
            const legacy = localStorage.getItem(k);
            if (legacy) { stored = legacy; break; }
          }
        }
        const raw = JSON.parse(stored || 'null');
        if (raw && Array.isArray(raw.decks)) {
          state.decks = raw.decks.map(initDeck);
          state.algo = { ...DEFAULT_ALGO, ...raw.algo };
          state.globalMaxSessionsPerDay = raw.globalMaxSessionsPerDay ?? 3;
        } else {
          state.decks = GERMAN_DECKS.map(initDeck);
        }
        save();
      } catch (e) {
        console.warn('Load failed, using defaults', e);
        state.decks = GERMAN_DECKS.map(initDeck);
      }
    }
    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          decks: state.decks, algo: state.algo, globalMaxSessionsPerDay: state.globalMaxSessionsPerDay
        }));
      } catch (e) {
        console.warn('Save failed', e);
      }
    }
    function deck() { return state.decks.find(d => d.id === state.deckId); }
    function deckAlgo(d) { return { ...state.algo, ...(d.algo || {}) }; }
    function nextId(items) { return items.length ? Math.max(...items.map(i => i.id)) + 1 : 1; }

    // ── Ebbinghaus full implementation ──
    // Retention R(t) = e^(-t / S)  where S = memory stability (days)
    function retentionAt(stability, daysSince) {
      return Math.exp(-daysSince / Math.max(stability, 0.1));
    }

    function intervalFromStability(S, algo) {
      // Find t where R(t) = retentionTarget: t = -S * ln(R)
      const t = -S * Math.log(Math.max(0.01, Math.min(0.99, algo.retentionTarget)));
      return Math.max(1, Math.round(t * algo.curveSteepness));
    }

    function getAlgorithm(d) {
      return deckAlgo(d).algorithm || 'ebbinghaus';
    }

    function computeEbbinghaus(deck, recallScore) {
      const algo = deckAlgo(deck);
      const sr = deck.sr;
      const passed = recallScore >= 0.6;
      if (!passed) {
        sr.repetitions = 0;
        sr.stability = Math.max(0.5, sr.stability * 0.5);
        sr.ease = Math.max(algo.minEase, sr.ease - algo.easePenalty);
        sr.intervalDays = algo.failIntervalDays;
      } else {
        const rep = sr.repetitions;
        if (rep < algo.intervals.length) sr.intervalDays = algo.intervals[rep];
        else sr.intervalDays = intervalFromStability(sr.stability, algo);
        sr.stability = sr.stability * (1 + sr.ease * recallScore);
        sr.ease = Math.min(algo.maxEase, sr.ease + algo.easeBonus * recallScore);
        sr.repetitions = rep + 1;
      }
      sr.lastReview = todayStr();
      return { nextDate: addDaysStr(todayStr(), sr.intervalDays), intervalDays: sr.intervalDays };
    }

    function leitnerDaysForBox(box) {
      return LEITNER_DAYS[Math.max(0, Math.min(4, (box || 1) - 1))];
    }

    function onCardLeitner(card, recalled) {
      card.leitnerBox = recalled ? Math.min(5, (card.leitnerBox || 1) + 1) : 1;
    }

    function onCardSM2(card, recalled) {
      const q = recalled ? 4 : 1;
      const sm = card.sm2 || { repetitions: 0, easeFactor: 2.5, intervalDays: 0 };
      if (q < 3) {
        sm.repetitions = 0;
        sm.intervalDays = 1;
      } else {
        if (sm.repetitions === 0) sm.intervalDays = 1;
        else if (sm.repetitions === 1) sm.intervalDays = 6;
        else sm.intervalDays = Math.round(sm.intervalDays * sm.easeFactor);
        sm.repetitions += 1;
        sm.easeFactor = Math.max(1.3, sm.easeFactor + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
      }
      card.sm2 = sm;
    }

    function computeLeitner(deck) {
      const boxes = deck.cards.map(c => c.leitnerBox || 1);
      const avg = boxes.reduce((a, b) => a + b, 0) / Math.max(1, boxes.length);
      const days = leitnerDaysForBox(Math.round(avg));
      deck.sr.intervalDays = days;
      deck.sr.lastReview = todayStr();
      return { nextDate: addDaysStr(todayStr(), days), intervalDays: days };
    }

    function computeSM2(deck) {
      const days = Math.max(1, ...deck.cards.map(c => c.sm2?.intervalDays || 1));
      deck.sr.intervalDays = days;
      deck.sr.lastReview = todayStr();
      return { nextDate: addDaysStr(todayStr(), days), intervalDays: days };
    }

    function computeNextReview(deck, recallScore) {
      const kind = getAlgorithm(deck);
      if (kind === 'leitner') return computeLeitner(deck);
      if (kind === 'sm2') return computeSM2(deck);
      return computeEbbinghaus(deck, recallScore);
    }

    function onCardReview(card, deck, recalled) {
      const kind = getAlgorithm(deck);
      if (kind === 'leitner') onCardLeitner(card, recalled);
      else if (kind === 'sm2') onCardSM2(card, recalled);
    }

    function cardColorStyle(colorId) {
      const c = CARD_COLORS.find(x => x.id === colorId) || CARD_COLORS[0];
      if (!c.hex) return 'border-left:4px solid var(--border)';
      return `border-left:4px solid ${c.border};background:${c.hex}`;
    }

    function flipColorStyle(colorId, face) {
      const c = CARD_COLORS.find(x => x.id === colorId) || CARD_COLORS[0];
      if (!c.hex) return face === 'back' ? 'background:var(--blue-light)' : 'background:var(--white)';
      return `background:${c.hex};border:2px solid ${c.border}`;
    }

    function scheduleReview(deck, date, source = 'auto') {
      if (!deck.schedule) deck.schedule = [];
      deck.schedule.push(newScheduleEntry(date, source));
    }

    function sessionsOn(deck, date) {
      return (deck.schedule || []).filter(s => s.date === date && !s.completed);
    }

    function completedOn(deck, date) {
      return (deck.schedule || []).filter(s => s.date === date && s.completed);
    }

    function nextScheduled(deck) {
      const upcoming = (deck.schedule || []).filter(s => !s.completed).map(s => s.date).sort();
      return upcoming[0] || null;
    }

    function isDue(deck) {
      return sessionsOn(deck, todayStr()).length > 0;
    }

    function getOverloadDays(deck) {
      const algo = deckAlgo(deck);
      const counts = {};
      (deck.schedule || []).filter(s => !s.completed).forEach(s => {
        counts[s.date] = (counts[s.date] || 0) + 1;
      });
      return Object.entries(counts).filter(([, c]) => c > algo.maxSessionsPerDay).map(([date, count]) => ({ date, count }));
    }

    function spreadOverload(deck) {
      const algo = deckAlgo(deck);
      const byDate = {};
      (deck.schedule || []).filter(s => !s.completed).forEach(s => {
        if (!byDate[s.date]) byDate[s.date] = [];
        byDate[s.date].push(s);
      });
      Object.entries(byDate).forEach(([date, sessions]) => {
        if (sessions.length <= algo.maxSessionsPerDay) return;
        sessions.slice(algo.maxSessionsPerDay).forEach(sess => {
          for (let i = 1; i <= 60; i++) {
            const target = addDaysStr(date, i);
            if (sessionsOn(deck, target).length < algo.maxSessionsPerDay) {
              sess.date = target;
              break;
            }
          }
        });
      });
      save();
    }

    function clearDay(deck, date) {
      deck.schedule = (deck.schedule || []).filter(s => s.date !== date || s.completed);
      save();
    }

    function rescheduleDay(deck, fromDate, toDate) {
      sessionsOn(deck, fromDate).forEach(s => { s.date = toDate; });
      save();
    }

    function allSessionsOn(date) {
      const out = [];
      state.decks.forEach(d => {
        sessionsOn(d, date).forEach(s => out.push({ deck: d, session: s }));
      });
      return out;
    }

    function countSessionsOn(date) {
      return state.decks.reduce((n, d) => n + sessionsOn(d, date).length, 0);
    }

    function globalOverloadDays() {
      const counts = {};
      state.decks.forEach(d => {
        (d.schedule || []).filter(s => !s.completed).forEach(s => {
          counts[s.date] = (counts[s.date] || 0) + 1;
        });
      });
      const max = state.globalMaxSessionsPerDay;
      return Object.entries(counts).filter(([, c]) => c > max).map(([date, count]) => ({ date, count }));
    }

    function spreadGlobalOverload() {
      const max = state.globalMaxSessionsPerDay;
      globalOverloadDays().forEach(({ date }) => {
        const items = allSessionsOn(date);
        items.slice(max).forEach(({ deck, session }) => {
          for (let i = 1; i <= 60; i++) {
            const target = addDaysStr(date, i);
            if (countSessionsOn(target) < max) {
              session.date = target;
              break;
            }
          }
        });
      });
      save();
    }

    function clearGlobalDay(date) {
      state.decks.forEach(d => clearDay(d, date));
      save();
    }

    function deckById(id) { return state.decks.find(d => d.id === id); }

    function isSmartScheduleOn(d) { return !!(d.ebbinghaus || deckAlgo(d).enabled); }
    function isEbbinghausOn(d) { return isSmartScheduleOn(d); }

    function getDeckPreset(d) {
      const p = deckAlgo(d).preset;
      if (p && PRESETS[p]) return p;
      const r = deckAlgo(d).retentionTarget;
      if (r >= 0.93) return 'intensive';
      if (r <= 0.87) return 'relaxed';
      return 'normal';
    }

    function applyPreset(d, key) {
      const p = PRESETS[key];
      if (!p) return;
      const { label, desc, ...algoFields } = p;
      d.algo = { ...deckAlgo(d), ...algoFields, preset: key, enabled: isEbbinghausOn(d) };
      save();
    }

    function setScheduleMode(d, auto) {
      d.ebbinghaus = auto;
      const a = deckAlgo(d);
      d.algo = { ...a, enabled: auto };
      if (auto && !a.preset) applyPreset(d, 'normal');
      else save();
    }

    // ── Splash ──
    function finishSplash() {
      if (state.splashDone) return;
      state.splashDone = true;
      const splash = document.getElementById('splash');
      if (splash) splash.classList.add('hide');
      state.ready = true;
      try { render(); } catch (e) {
        console.error(e);
        document.getElementById('app').innerHTML = '<main style="padding:24px"><h2>Something went wrong</h2><p>Please refresh the page.</p></main>';
      }
    }

    function startSplash() {
      document.getElementById('splash-name').textContent = state.userName || 'Friend';
      const go = (e) => { e?.preventDefault?.(); e?.stopPropagation?.(); finishSplash(); };
      window.finishSplash = finishSplash;
      document.getElementById('splash-continue')?.addEventListener('click', go);
      document.getElementById('splash')?.addEventListener('click', go);
      document.getElementById('splash')?.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') go(e); });
      setTimeout(finishSplash, 2000);
    }

    // ── Render ──
    function render() {
      if (!state.ready) return;
      const app = document.getElementById('app');
      try {
        if (state.view === 'study') app.innerHTML = renderStudy();
        else if (state.view === 'deck') app.innerHTML = renderDeck();
        else if (state.tab === 'calendar') app.innerHTML = renderGlobalCalendar();
        else app.innerHTML = renderHome();
        if (state.modal) app.innerHTML += renderModal();
        if (state.view === 'home') app.innerHTML += renderBottomNav();
        bind();
      } catch (e) {
        console.error('Render error', e);
        app.innerHTML = '<main style="padding:24px"><h2>Something went wrong</h2><p>Please refresh the page.</p></main>';
      }
    }

    function renderBottomNav() {
      return `
        <nav class="bottom-nav">
          <button class="${state.tab === 'decks' ? 'active' : ''}" data-tab="decks"><span class="ni">📚</span>Decks</button>
          <button class="${state.tab === 'calendar' ? 'active' : ''}" data-tab="calendar"><span class="ni">📅</span>Calendar</button>
        </nav>`;
    }

    function renderHome() {
      const list = state.decks.map(d => {
        const due = isDue(d);
        const next = nextScheduled(d);
        return `
          <div class="deck-card" data-open-deck="${d.id}">
            <button class="delete" data-del-deck="${d.id}">✕</button>
            <h2>🇩🇪 ${esc(d.name)}${isSmartScheduleOn(d) ? `<span class="badge-ebb">${ALGORITHMS[getAlgorithm(d)]?.short || 'Auto'}</span>` : ''}</h2>
            <p>${esc(d.description || '')}</p>
            <div class="meta">
              <span class="due">${due ? 'Scheduled today' : 'On track'}</span>
              <span class="next">${d.cards.length} cards · ${next ? formatDate(next) : 'Use Calendar'}</span>
            </div>
          </div>`;
      }).join('');
      const dueDecks = state.decks.filter(isDue);
      return `
        <header><h1>🇩🇪 German Flashcards</h1></header>
        <main>
          ${dueDecks.length ? `<div class="overload-box" style="background:var(--blue-light);border-color:var(--blue-soft)">
            <h3 style="color:var(--blue-dark)">${dueDecks.length} deck${dueDecks.length>1?'s':''} due today</h3>
            <p style="font-size:.85rem;color:var(--muted)">Open Calendar tab to schedule & review</p>
          </div>` : ''}
          ${list}
        </main>
        <button class="fab" data-new-deck>+</button>`;
    }

    function renderGlobalCalendar() {
      const y = state.calMonth.getFullYear();
      const m = state.calMonth.getMonth();
      const first = new Date(y, m, 1).getDay();
      const dim = daysInMonth(y, m);
      const monthName = new Date(y, m, 1).toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
      const selected = state.calSelected || todayStr();
      const overload = globalOverloadDays();

      let cells = '';
      for (let i = 0; i < first; i++) cells += '<div class="cal-day blank"></div>';
      for (let day = 1; day <= dim; day++) {
        const ds = fmt(y, m + 1, day);
        const items = allSessionsOn(ds);
        const doneCount = state.decks.reduce((n, d) => n + completedOn(d, ds).length, 0);
        const overloaded = items.length > state.globalMaxSessionsPerDay;
        let cls = 'cal-day';
        if (ds === todayStr()) cls += ' today';
        if (ds === selected) cls += ' selected';
        if (overloaded) cls += ' overload';
        const badges = items.slice(0, 2).map(({ deck }) =>
          `<span class="sess deck">${esc(deck.name.slice(0, 8))}</span>`
        ).join('') + (items.length > 2 ? `<span class="sess">+${items.length - 2}</span>` : '');
        cells += `<div class="${cls}" data-pick-day="${ds}"><span class="num">${day}</span>${badges}</div>`;
      }

      const selItems = allSessionsOn(selected);
      const deckOpts = state.decks.map(d =>
        `<option value="${d.id}" ${state.scheduleDeckId == d.id ? 'selected' : ''}>${esc(d.name)}</option>`
      ).join('');

      return `
        <header><h1>📅 Study Calendar</h1></header>
        <main>
          ${overload.length ? `
            <div class="overload-box">
              <h3>⚠ ${overload.length} busy day${overload.length > 1 ? 's' : ''}</h3>
              <p style="font-size:.82rem;color:#92400e;margin-bottom:8px">More than ${state.globalMaxSessionsPerDay} deck sessions on one day.</p>
              <button class="btn-warn" data-spread-global>Spread sessions out</button>
              ${overload.map(o => `<button class="btn-warn" style="margin-top:6px" data-clear-global="${o.date}">Clear ${formatDate(o.date)} (${o.count})</button>`).join('')}
            </div>` : ''}
          <div class="cal-wrap">
            <div class="cal-header">
              <button data-cal-prev>‹</button>
              <h2>${monthName}</h2>
              <button data-cal-next>›</button>
            </div>
            <div class="cal-weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>
            <div class="cal-grid">${cells}</div>
            <div class="cal-legend">
              <span><i style="background:var(--blue)"></i>Deck scheduled</span>
              <span><i style="border:2px solid var(--danger);background:#fef2f2"></i>Too many</span>
            </div>
          </div>
          <div class="day-panel">
            <h3>${formatDate(selected)}</h3>
            ${selItems.length ? selItems.map(({ deck, session }) => `
              <div class="session-row">
                <span>🇩🇪 ${esc(deck.name)} <small style="color:var(--muted)">(${session.source})</small></span>
                <span>
                  ${selected <= todayStr() ? `<button class="btn-danger-sm" style="margin-right:6px;background:var(--blue-light);color:var(--blue);border-color:var(--blue-soft)" data-start-deck="${deck.id}">Study</button>` : ''}
                  <button class="btn-danger-sm" data-rm-session="${session.id}" data-rm-deck="${deck.id}">Remove</button>
                </span>
              </div>`).join('') : '<p style="font-size:.85rem;color:var(--muted)">Nothing scheduled — add a deck below</p>'}
            <div class="field" style="margin-top:12px">
              <label>Which deck?</label>
              <select id="sched-deck">${deckOpts || '<option value="">No decks</option>'}</select>
            </div>
            <button class="btn-primary" data-add-global-session="${selected}">Add study session</button>
            ${selItems.length ? `<button class="btn-warn" data-clear-global="${selected}">Clear this day</button>` : ''}
          </div>
          <details class="schedule-fold" id="cal-settings-fold" ${state.calSettingsOpen ? 'open' : ''}>
            <summary>Calendar options <span class="sched-line">Busy-day limit: ${state.globalMaxSessionsPerDay}</span></summary>
            <div class="sched-body">
              <p class="hint" style="margin-bottom:10px">Warn when more than this many decks land on the same day.</p>
              <div class="stepper">
                <button data-max-dec>−</button>
                <span class="val">${state.globalMaxSessionsPerDay}</span>
                <button data-max-inc>+</button>
                <span style="font-size:.85rem;color:var(--muted)">decks / day</span>
              </div>
            </div>
          </details>
        </main>`;
    }

    function renderDeck() {
      const d = deck();
      if (!d) return '';
      const ebbOn = isEbbinghausOn(d);
      return `
        <header>
          <button class="icon-btn" data-go-home>←</button>
          <h1>${esc(d.name)}${ebbOn ? `<span class="badge-ebb">${ALGORITHMS[getAlgorithm(d)]?.short || 'Auto'}</span>` : ''}</h1>
        </header>
        <main>
          ${renderScheduleCard(d)}
          ${renderDeckCards(d)}
        </main>
        <button class="fab" data-new-card>+</button>`;
    }

    function scheduleSummary(d) {
      if (!isSmartScheduleOn(d)) return '📅 Manual · use Calendar tab';
      const alg = ALGORITHMS[getAlgorithm(d)]?.label || 'Smart';
      const next = nextScheduled(d);
      const extra = getAlgorithm(d) === 'ebbinghaus' ? ' · ' + PRESETS[getDeckPreset(d)].label : '';
      return `🧠 ${alg}${extra}${next ? ' · ' + formatDate(next) : ''}`;
    }

    function renderScheduleCard(d) {
      const ebbOn = isEbbinghausOn(d);
      const preset = getDeckPreset(d);
      const next = nextScheduled(d);
      return `
        <details class="schedule-fold" id="deck-schedule-fold" ${state.deckScheduleOpen ? 'open' : ''}>
          <summary>Review schedule <span class="sched-line">${scheduleSummary(d)}</span></summary>
          <div class="sched-body">
          <h3>When should you review?</h3>
          <p class="hint">Optional — defaults work for most people.</p>
          <div class="mode-pick">
            <button type="button" class="mode-opt ${!ebbOn ? 'active' : ''}" data-set-mode="manual">
              <div class="mo-icon">📅</div>
              <strong>I'll pick the dates</strong>
              <span>Use the Calendar tab to schedule study days yourself.</span>
            </button>
            <button type="button" class="mode-opt ${ebbOn ? 'active' : ''}" data-set-mode="auto">
              <div class="mo-icon">🧠</div>
              <strong>Smart schedule</strong>
              <span>After each session, the app picks your next review day.</span>
            </button>
          </div>
          ${ebbOn ? `
            <p style="font-size:.78rem;font-weight:600;color:var(--muted);margin:14px 0 8px">ALGORITHM</p>
            <div class="algo-pick">
              ${Object.entries(ALGORITHMS).map(([k, a]) => `
                <button type="button" class="algo-opt ${getAlgorithm(d) === k ? 'active' : ''}" data-set-algorithm="${k}">
                  <strong>${a.label}</strong>
                  <span>${a.desc}</span>
                </button>`).join('')}
            </div>
            ${getAlgorithm(d) === 'ebbinghaus' ? `
            <p style="font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:8px">HOW OFTEN (Ebbinghaus)</p>
            <div class="preset-row">
              ${Object.entries(PRESETS).map(([k, p]) =>
                `<button type="button" class="preset-btn ${preset === k ? 'active' : ''}" data-preset="${k}" title="${p.desc}">${p.label}</button>`
              ).join('')}
            </div>
            <p style="font-size:.75rem;color:var(--muted);margin-top:8px">${PRESETS[preset].desc}</p>` : `
            <p style="font-size:.75rem;color:var(--muted);margin-top:4px">${ALGORITHMS[getAlgorithm(d)].desc}</p>
            ${getAlgorithm(d) === 'leitner' ? '<p class="card-meta">Each card moves through 5 boxes (1→14 days). Got it = up, Missed = back to box 1.</p>' : ''}
            ${getAlgorithm(d) === 'sm2' ? '<p class="card-meta">Each card gets its own ease factor. Intervals grow: 1d → 6d → then × ease.</p>' : ''}`}
            ${next ? `<p style="font-size:.8rem;color:var(--blue);margin-top:10px">Next scheduled: <strong>${formatDate(next)}</strong></p>` : ''}
            <details class="advanced">
              <summary>Advanced tuning</summary>
              ${renderAdvancedFields(d)}
            </details>` : `
            <p style="font-size:.8rem;color:var(--muted);margin-top:10px">Go to <strong>Calendar</strong> (bottom) to add this deck to a day.</p>`}
          </div>
        </details>`;
    }

    function renderAdvancedFields(d) {
      const a = deckAlgo(d);
      return `
        <div class="field" style="margin-top:12px"><label>Days between reviews (first few rounds)</label>
          <input id="a-intervals" value="${a.intervals.join(', ')}" />
          <small>Comma-separated, e.g. 1, 2, 4, 7, 15</small>
        </div>
        <div class="field"><label>Days to wait after a missed session</label>
          <input id="a-fail" type="number" min="1" max="14" value="${a.failIntervalDays}" />
        </div>
        <button class="btn-outline" data-save-advanced>Apply advanced settings</button>`;
    }

    function renderColorPicker(selected) {
      return `<div class="color-pick">${CARD_COLORS.map(c => `
        <button type="button" class="color-swatch ${c.id === 'none' ? 'none' : ''} ${(selected || 'none') === c.id ? 'active' : ''}"
          data-pick-color="${c.id}" title="${c.id}"
          style="${c.hex ? 'background:' + c.hex + ';border-color:' + c.border : ''}"></button>`).join('')}</div>`;
    }

    function renderDeckCards(d) {
      const alg = getAlgorithm(d);
      const cards = d.cards.map(c => `
        <div class="card-item" style="${cardColorStyle(c.color)}">
          <div class="en">${esc(c.en)}</div>
          <div class="de">${esc(c.de)}</div>
          ${isSmartScheduleOn(d) && alg === 'leitner' ? `<div class="card-meta">Leitner box ${c.leitnerBox || 1} · next in ${leitnerDaysForBox(c.leitnerBox)}d</div>` : ''}
          ${isSmartScheduleOn(d) && alg === 'sm2' ? `<div class="card-meta">SM-2 · ${c.sm2?.intervalDays || 0}d interval · ease ${(c.sm2?.easeFactor || 2.5).toFixed(1)}</div>` : ''}
          <div class="card-actions">
            <button data-edit-card="${c.id}">Edit</button>
            <button data-del-card="${c.id}" style="color:var(--danger)">Delete</button>
          </div>
        </div>`).join('');
      return `
        ${d.cards.length ? `<button class="btn-primary" data-study-now>Study now (${d.cards.length} cards)</button>` : ''}
        ${cards || '<div class="empty"><p>No cards yet — tap + to add</p></div>'}`;
    }

    function renderStudy() {
      const s = state.study;
      if (!s) return '';
      const d = deck();
      if (s.done) {
        const total = s.correct + s.incorrect;
        const score = total ? s.correct / total : 0;
        const pct = Math.round(score * 100);
        return `
          <header><button class="icon-btn" data-end-study>←</button><h1>Session done</h1></header>
          <main style="text-align:center;padding-top:24px">
            <h2 style="font-size:2.5rem;color:var(--blue);margin:16px 0">${pct}%</h2>
            <p style="color:var(--muted);margin-bottom:20px">Got it: ${s.correct} · Missed: ${s.incorrect}</p>
            ${isSmartScheduleOn(d)
              ? `<p style="color:var(--muted);margin-bottom:16px">${ALGORITHMS[getAlgorithm(d)].label}: next review on <strong>Calendar</strong> in ${d.sr.intervalDays} day(s).</p>`
              : '<p style="color:var(--muted);margin-bottom:16px">Add your next study day on the <strong>Calendar</strong> tab.</p>'}
            <button class="btn-primary" data-end-study>Back to deck</button>
          </main>`;
      }
      const c = s.cards[s.index];
      const prog = ((s.index + (s.flipped ? .5 : 0)) / s.cards.length) * 100;
      return `
        <header><button class="icon-btn" data-end-study>←</button><h1>Review</h1></header>
        <main>
          <div class="progress-row"><span>${s.index+1} / ${s.cards.length}</span><span>${s.flipped?'German':'English'}</span></div>
          <div class="progress-bar"><div style="width:${prog}%"></div></div>
          <div class="flip-card ${s.flipped?'flipped':''}" data-flip>
            <div class="flip-inner">
              <div class="flip-face flip-front" style="${flipColorStyle(c.color,'front')}">${esc(c.en)}</div>
              <div class="flip-face flip-back" style="${flipColorStyle(c.color,'back')}">${esc(c.de)}</div>
            </div>
          </div>
          ${s.flipped ? `<div class="study-actions">
            <button class="missed" data-ans="0">Missed</button>
            <button class="got-it" data-ans="1">Got it</button>
          </div>` : `<button class="show-answer" data-flip>Show German</button>`}
        </main>`;
    }

    function renderModal() {
      const m = state.modal;
      if (m.type === 'welcome') return `<div class="modal-bg"><div class="modal">
        <h2>Willkommen!</h2>
        <p style="color:var(--muted);font-size:.88rem;margin-bottom:10px">Your name appears on the splash screen.</p>
        <input id="welcome-name" placeholder="Your name" />
        <div class="modal-actions"><button class="confirm" data-save-welcome>Continue</button></div>
      </div></div>`;
      if (m.type === 'deck') return `<div class="modal-bg" data-close><div class="modal" onclick="event.stopPropagation()">
        <h2>New German deck</h2>
        <input id="m-name" placeholder="Deck name" />
        <textarea id="m-desc" placeholder="Description" rows="2"></textarea>
        <div class="modal-actions"><button class="cancel" data-close>Cancel</button><button class="confirm" data-save-deck>Save</button></div>
      </div></div>`;
      if (m.type === 'card') return `<div class="modal-bg" data-close><div class="modal" onclick="event.stopPropagation()">
        <h2>${m.edit?'Edit':'New'} card</h2>
        <input id="m-en" placeholder="English" value="${esc(m.en||'')}" />
        <input id="m-de" placeholder="German" value="${esc(m.de||'')}" />
        <label style="font-size:.78rem;font-weight:600;color:var(--muted)">Card color</label>
        ${renderColorPicker(m.color || 'none')}
        <input type="hidden" id="m-color" value="${esc(m.color || 'none')}" />
        <div class="modal-actions"><button class="cancel" data-close>Cancel</button><button class="confirm" data-save-card>Save</button></div>
      </div></div>`;
      return '';
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

    function startStudy(d) {
      state.study = { cards: [...d.cards].sort(() => Math.random() - .5), index: 0, flipped: false, correct: 0, incorrect: 0, done: false };
      state.view = 'study';
      render();
    }

    function finishStudy() {
      const s = state.study;
      const d = deck();
      if (!s || !d) return;
      const total = s.correct + s.incorrect;
      const score = total ? s.correct / total : 0.5;
      const today = todayStr();

      sessionsOn(d, today).forEach(sess => { sess.completed = true; });

      if (isSmartScheduleOn(d)) {
        const { nextDate } = computeNextReview(d, score);
        scheduleReview(d, nextDate, 'auto');
      }
      save();
    }

    function bind() {
      document.querySelectorAll('[data-tab]').forEach(el => el.addEventListener('click', () => {
        state.tab = el.dataset.tab;
        state.view = 'home';
        state.deckId = null;
        if (state.tab === 'calendar') state.calSelected = todayStr();
        render();
      }));
      document.querySelector('[data-go-home]')?.addEventListener('click', () => { state.view = 'home'; state.deckId = null; render(); });
      document.querySelectorAll('[data-open-deck]').forEach(el => el.addEventListener('click', e => {
        if (e.target.closest('[data-del-deck]')) return;
        state.deckId = +el.dataset.openDeck;
        state.view = 'deck';
        render();
      }));
      document.querySelectorAll('[data-del-deck]').forEach(el => el.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('Delete deck?')) { state.decks = state.decks.filter(d => d.id !== +el.dataset.delDeck); save(); render(); }
      }));
      document.querySelector('[data-new-deck]')?.addEventListener('click', () => { state.modal = { type: 'deck' }; render(); });
      document.querySelector('[data-new-card]')?.addEventListener('click', () => { state.modal = { type: 'card' }; render(); });
      document.getElementById('deck-schedule-fold')?.addEventListener('toggle', (e) => {
        state.deckScheduleOpen = e.target.open;
      });
      document.getElementById('cal-settings-fold')?.addEventListener('toggle', (e) => {
        state.calSettingsOpen = e.target.open;
      });
      document.querySelectorAll('[data-set-mode]').forEach(el => el.addEventListener('click', () => {
        state.deckScheduleOpen = true;
        setScheduleMode(deck(), el.dataset.setMode === 'auto');
        render();
      }));
      document.querySelectorAll('[data-preset]').forEach(el => el.addEventListener('click', () => {
        state.deckScheduleOpen = true;
        applyPreset(deck(), el.dataset.preset);
        render();
      }));
      document.querySelectorAll('[data-set-algorithm]').forEach(el => el.addEventListener('click', () => {
        state.deckScheduleOpen = true;
        const d = deck();
        d.algo = { ...deckAlgo(d), algorithm: el.dataset.setAlgorithm, enabled: true };
        d.ebbinghaus = true;
        save();
        render();
      }));
      document.querySelectorAll('[data-pick-color]').forEach(el => el.addEventListener('click', () => {
        const inp = document.getElementById('m-color');
        if (inp) inp.value = el.dataset.pickColor;
        document.querySelectorAll('[data-pick-color]').forEach(s => s.classList.toggle('active', s.dataset.pickColor === el.dataset.pickColor));
      }));
      document.querySelector('[data-cal-prev]')?.addEventListener('click', () => {
        state.calMonth = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth() - 1, 1); render();
      });
      document.querySelector('[data-cal-next]')?.addEventListener('click', () => {
        state.calMonth = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth() + 1, 1); render();
      });
      document.querySelectorAll('[data-pick-day]').forEach(el => el.addEventListener('click', () => {
        state.calSelected = el.dataset.pickDay; render();
      }));
      document.querySelectorAll('[data-add-global-session]').forEach(el => el.addEventListener('click', () => {
        const deckId = parseInt(document.getElementById('sched-deck')?.value, 10);
        const d = deckById(deckId);
        if (!d) return;
        scheduleReview(d, el.dataset.addGlobalSession, 'manual');
        save(); render();
      }));
      document.querySelectorAll('[data-rm-session]').forEach(el => el.addEventListener('click', () => {
        const id = +el.dataset.rmSession;
        const d = deckById(+el.dataset.rmDeck) || deck();
        if (d) { d.schedule = d.schedule.filter(s => s.id !== id); save(); render(); }
      }));
      document.querySelectorAll('[data-clear-global]').forEach(el => el.addEventListener('click', () => {
        if (confirm('Remove all deck sessions on this day?')) { clearGlobalDay(el.dataset.clearGlobal); render(); }
      }));
      document.querySelector('[data-spread-global]')?.addEventListener('click', () => { spreadGlobalOverload(); render(); });
      document.querySelector('[data-max-inc]')?.addEventListener('click', () => {
        state.globalMaxSessionsPerDay = Math.min(10, state.globalMaxSessionsPerDay + 1);
        save(); render();
      });
      document.querySelector('[data-max-dec]')?.addEventListener('click', () => {
        state.globalMaxSessionsPerDay = Math.max(1, state.globalMaxSessionsPerDay - 1);
        save(); render();
      });
      document.querySelectorAll('[data-start-deck]').forEach(el => el.addEventListener('click', () => {
        const d = deckById(+el.dataset.startDeck);
        if (d) { state.deckId = d.id; startStudy(d); }
      }));
      document.querySelector('[data-study-now]')?.addEventListener('click', () => startStudy(deck()));
      document.querySelectorAll('[data-end-study]').forEach(el => el.addEventListener('click', () => {
        state.study = null; state.view = 'deck'; render();
      }));
      document.querySelector('[data-save-advanced]')?.addEventListener('click', () => {
        state.deckScheduleOpen = true;
        const d = deck();
        const intervals = document.getElementById('a-intervals').value.split(',').map(s => parseInt(s.trim(), 10)).filter(n => n > 0);
        d.algo = {
          ...deckAlgo(d),
          intervals: intervals.length ? intervals : deckAlgo(d).intervals,
          failIntervalDays: parseInt(document.getElementById('a-fail').value, 10) || 1,
          enabled: true,
        };
        save(); render();
      });
      document.querySelectorAll('[data-edit-card]').forEach(el => el.addEventListener('click', () => {
        const c = deck().cards.find(x => x.id === +el.dataset.editCard);
        state.modal = { type: 'card', edit: c.id, en: c.en, de: c.de, color: c.color || 'none' }; render();
      }));
      document.querySelectorAll('[data-del-card]').forEach(el => el.addEventListener('click', () => {
        if (confirm('Delete card?')) { deck().cards = deck().cards.filter(c => c.id !== +el.dataset.delCard); save(); render(); }
      }));
      document.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => { state.modal = null; render(); }));
      document.querySelector('[data-save-welcome]')?.addEventListener('click', () => {
        const n = document.getElementById('welcome-name').value.trim();
        if (n) { state.userName = n; localStorage.setItem('flashcards_user', n); }
        state.modal = null; render();
      });
      document.querySelector('[data-save-deck]')?.addEventListener('click', () => {
        const name = document.getElementById('m-name').value.trim();
        if (!name) return;
        const desc = document.getElementById('m-desc').value.trim();
        state.decks.unshift(initDeck({ id: nextId(state.decks), name, description: desc, cards: [] }));
        save(); state.modal = null; render();
      });
      document.querySelector('[data-save-card]')?.addEventListener('click', () => {
        const en = document.getElementById('m-en').value.trim();
        const de = document.getElementById('m-de').value.trim();
        if (!en || !de) return;
        const d = deck();
        const colorVal = document.getElementById('m-color')?.value || 'none';
        const color = colorVal === 'none' ? null : colorVal;
        if (state.modal.edit) {
          const c = d.cards.find(x => x.id === state.modal.edit);
          c.en = en; c.de = de; c.color = color;
        } else {
          d.cards.push(initCard({ id: nextId(d.cards), en, de, color }));
        }
        save(); state.modal = null; render();
      });
      const flip = () => { if (state.study && !state.study.done) { state.study.flipped = !state.study.flipped; render(); } };
      document.querySelector('[data-flip]')?.addEventListener('click', flip);
      document.querySelectorAll('[data-ans]').forEach(el => el.addEventListener('click', () => {
        const ok = el.dataset.ans === '1';
        const d = deck();
        const cardRef = state.study.cards[state.study.index];
        const real = d?.cards.find(c => c.id === cardRef.id);
        if (real && d) onCardReview(real, d, ok);
        if (ok) state.study.correct++; else state.study.incorrect++;
        state.study.flipped = false;
        if (state.study.index + 1 >= state.study.cards.length) {
          state.study.done = true;
          if (!state.study.applied) { finishStudy(); state.study.applied = true; }
        } else state.study.index++;
        render();
      }));
    }

    startSplash();
    load();
  </script>
</body>
</html>
