<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Shine — Lifestyle Flashcards</title>
  <meta name="description" content="Shine helps you store everyday knowledge in clusters and review with smart spaced repetition." />
  <meta name="theme-color" content="#5b5ef7" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Shine" />
  <meta property="og:title" content="Shine — Lifestyle Flashcards" />
  <meta property="og:description" content="Organize knowledge in clusters. Study smarter with Ebbinghaus, Leitner, and SM-2." />
  <meta property="og:type" content="website" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:#5b5ef7; --primary-dark:#4346e8; --primary-light:#ededff;
      --accent:#8b5cf6; --accent-soft:#f3e8ff;
      --blue:var(--primary); --blue-dark:var(--primary-dark); --blue-light:var(--primary-light); --blue-soft:#d4d6ff;
      --bg:#f4f6fb; --surface:#fff; --surface-2:#f8f9fd; --white:#fff;
      --text:#111827; --text-soft:#374151; --muted:#6b7280; --border:rgba(15,23,42,.06);
      --danger:#ef4444; --warn:#f59e0b; --success:#10b981;
      --shadow-sm:0 1px 2px rgba(15,23,42,.04);
      --shadow:0 8px 30px rgba(91,94,247,.08), 0 2px 8px rgba(15,23,42,.04);
      --shadow-lg:0 20px 50px rgba(91,94,247,.14), 0 8px 20px rgba(15,23,42,.06);
      --radius:20px; --radius-sm:14px; --radius-pill:999px;
      --ease:cubic-bezier(.22,1,.36,1);
      --glass:rgba(255,255,255,.78);
      --glass-border:rgba(255,255,255,.65);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-tap-highlight-color:transparent}
    body{
      font-family:'Plus Jakarta Sans',system-ui,sans-serif;
      background:linear-gradient(165deg,#e8eaff 0%,#f4f6fb 38%,#faf8ff 100%);
      color:var(--text);
      min-height:100vh;max-width:480px;margin:0 auto;
      -webkit-font-smoothing:antialiased;
      position:relative;overflow-x:hidden;
      box-shadow:0 0 80px rgba(91,94,247,.12);
    }
    body::before,body::after{
      content:'';position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(60px);opacity:.55;
    }
    body::before{width:280px;height:280px;top:-80px;right:-60px;background:radial-gradient(circle,#c7d2fe,transparent 70%)}
    body::after{width:320px;height:320px;bottom:80px;left:-100px;background:radial-gradient(circle,#ddd6fe,transparent 70%)}
    #app{position:relative;z-index:1;animation:pageIn .35s var(--ease)}
    @keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    #splash{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;background:#0a0a12;overflow:hidden;transition:opacity .6s var(--ease),visibility .6s}
    #splash.hide{opacity:0;visibility:hidden;pointer-events:none;display:none}
    .splash-photo{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.06);animation:splashKen 14s var(--ease) forwards;transition:opacity .7s var(--ease)}
    .splash-photo.is-loading{opacity:0}
    .splash-photo.is-ready{opacity:1}
    @keyframes splashKen{to{transform:scale(1)}}
    .splash-scrim{
      position:absolute;inset:0;z-index:1;
      background:linear-gradient(180deg,rgba(6,8,18,.5) 0%,rgba(8,10,20,.12) 35%,rgba(8,10,20,.25) 55%,rgba(8,10,20,.9) 78%,rgba(8,10,20,.97) 100%);
    }
    .splash-topbar{
      position:absolute;top:0;left:0;right:0;z-index:3;display:flex;align-items:center;gap:11px;
      padding:calc(12px + env(safe-area-inset-top)) 20px 12px;
      background:linear-gradient(180deg,rgba(0,0,0,.45),transparent);
    }
    .splash-mark{
      width:40px;height:40px;border-radius:12px;flex-shrink:0;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      display:flex;align-items:center;justify-content:center;font-size:1.1rem;
      box-shadow:0 6px 20px rgba(91,94,247,.4);border:1px solid rgba(255,255,255,.2);
    }
    .splash-wordmark{font-size:1.4rem;font-weight:800;letter-spacing:-.03em;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.4)}
    .splash-hero{
      position:absolute;left:0;right:0;bottom:38%;z-index:2;text-align:center;padding:0 24px;pointer-events:none;
    }
    .splash-hero.splash-in .splash-hero-stamp{animation:stampIn .5s var(--ease) backwards}
    .splash-hero.splash-in .splash-hook{animation:splashLine .45s var(--ease) .1s backwards}
    @keyframes stampIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    .splash-hero-stamp{
      font-size:clamp(2rem,11vw,2.8rem);font-weight:900;line-height:.95;letter-spacing:.06em;
      text-transform:uppercase;color:#fff;text-shadow:0 4px 32px rgba(0,0,0,.55);
    }
    .splash-hook{
      margin-top:12px;font-size:clamp(1.1rem,4.5vw,1.35rem);font-weight:600;font-style:italic;
      color:rgba(255,255,255,.92);text-shadow:0 2px 20px rgba(0,0,0,.45);
    }
    .splash-content{
      position:relative;z-index:2;width:100%;max-width:480px;color:#fff;
      padding:0 24px calc(22px + env(safe-area-inset-bottom));text-align:center;
    }
    .splash-content.splash-in .splash-actions,.splash-content.splash-in .splash-auth,.splash-content.splash-in .splash-foot{
      animation:splashLine .5s var(--ease) backwards;
    }
    .splash-content.splash-in .splash-actions{animation-delay:.25s}
    .splash-content.splash-in .splash-auth{animation-delay:.32s}
    .splash-content.splash-in .splash-foot{animation-delay:.38s}
    @keyframes splashLine{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .splash-actions{margin-top:0}
    .splash-begin{
      width:100%;padding:16px 20px;border:none;border-radius:var(--radius-sm);
      background:#fff;color:#1e1b4b;font-weight:800;font-size:1rem;font-family:inherit;
      cursor:pointer;box-shadow:0 12px 36px rgba(0,0,0,.28);transition:transform .15s var(--ease);
    }
    .splash-begin:active{transform:scale(.98)}
    .splash-auth{margin-top:10px}
    .splash-foot{margin-top:12px;display:flex;justify-content:center;gap:18px}
    .splash-link{
      padding:0;background:none;border:none;color:rgba(255,255,255,.5);
      font-size:.75rem;font-weight:600;font-family:inherit;cursor:pointer;
    }
    .splash-link:hover{color:rgba(255,255,255,.85)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    header.app-header{
      background:rgba(255,255,255,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(91,94,247,.08);padding:18px 20px 16px;
      display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;
      box-shadow:0 4px 24px rgba(91,94,247,.06);
    }
    header.app-header{position:sticky}
    header.app-header::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--primary),var(--accent),#a78bfa);
    }
    header:not(.app-header){background:var(--glass);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border);padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
    header h1{font-size:1.15rem;font-weight:700;flex:1;color:var(--text);letter-spacing:-.02em}
    .brand{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
    .brand-mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.15rem;box-shadow:0 8px 20px rgba(91,94,247,.35);flex-shrink:0}
    .icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-soft);font-size:1rem;padding:9px 11px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .15s var(--ease),box-shadow .15s}
    .icon-btn:active{transform:scale(.96)}
    main{padding:18px 18px 110px}
    .deck-card{
      background:linear-gradient(135deg,rgba(255,255,255,.98),rgba(248,249,253,.92));
      border:1px solid rgba(91,94,247,.14);border-radius:var(--radius);
      padding:18px 18px 18px 24px;margin-bottom:12px;cursor:pointer;position:relative;
      box-shadow:0 10px 32px rgba(91,94,247,.1);transition:transform .22s var(--ease),box-shadow .22s var(--ease);
      overflow:hidden;
    }
    .deck-card::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:5px;border-radius:0 6px 6px 0;background:linear-gradient(180deg,var(--primary),var(--accent));box-shadow:0 0 12px rgba(91,94,247,.4)}
    .deck-card:active{transform:scale(.985);box-shadow:var(--shadow)}
    .deck-card h2{font-size:1.02rem;font-weight:700;color:var(--text);letter-spacing:-.01em;padding-right:28px}
    .deck-card p{color:var(--muted);font-size:.84rem;margin-top:6px;line-height:1.45}
    .deck-card .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;font-size:.72rem;font-weight:600}
    .deck-card .due{color:var(--primary);background:var(--primary-light);padding:4px 10px;border-radius:var(--radius-pill)}
    .deck-card .next{color:var(--muted);background:var(--surface-2);padding:4px 10px;border-radius:var(--radius-pill)}
    .deck-card .delete{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;background:var(--surface-2);border:none;color:var(--muted);cursor:pointer;font-size:.75rem;transition:background .15s,color .15s}
    .deck-card .delete:hover{background:#fee2e2;color:var(--danger)}
    .fab{
      position:fixed;right:20px;bottom:92px;width:58px;height:58px;border-radius:18px;
      background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border:none;
      font-size:1.75rem;font-weight:300;line-height:1;cursor:pointer;
      box-shadow:0 12px 32px rgba(91,94,247,.45);transition:transform .2s var(--ease),box-shadow .2s;
    }
    .fab:active{transform:scale(.94)}
    .deck-tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:4px}
    .deck-tabs button{flex:1;border:none;background:none;padding:10px 6px;border-radius:10px;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer}
    .deck-tabs button.active{background:var(--blue);color:#fff}
    .btn-primary{
      width:100%;padding:15px 18px;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      color:#fff;border:none;border-radius:var(--radius-sm);font-weight:700;font-size:.92rem;
      cursor:pointer;margin-bottom:10px;box-shadow:0 8px 24px rgba(91,94,247,.32);
      transition:transform .15s var(--ease),box-shadow .15s;
    }
    .btn-primary:active{transform:scale(.98)}
    .btn-outline{
      width:100%;padding:14px 18px;background:var(--surface);color:var(--primary-dark);
      border:1.5px solid var(--blue-soft);border-radius:var(--radius-sm);
      font-weight:600;font-size:.9rem;cursor:pointer;margin-bottom:10px;
      transition:background .15s,border-color .15s;
    }
    .btn-outline:hover{background:var(--primary-light)}
    .btn-warn{width:100%;padding:13px;background:#fffbeb;color:#b45309;border:1px solid #fde68a;border-radius:var(--radius-sm);font-weight:600;cursor:pointer;margin-top:8px}
    .btn-danger-sm{padding:8px 14px;background:#fef2f2;color:var(--danger);border:1px solid #fecaca;border-radius:var(--radius-pill);font-size:.78rem;font-weight:600;cursor:pointer}
    .card-list{display:flex;flex-direction:column;gap:10px}
    .deck-toolbar{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
    .deck-toolbar .btn-primary{margin-bottom:0}
    .btn-shuffle{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:0}
    .card-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:0;cursor:grab;touch-action:none;will-change:transform;box-shadow:var(--shadow-sm)}
    .card-item .card-actions{cursor:default;touch-action:auto}
    .card-item .card-actions button{cursor:pointer;touch-action:auto}
    .card-list.is-dragging .card-item:not(.drag-lifted){transition:transform .25s cubic-bezier(.2,.8,.2,1)}
    .card-item.drag-lifted{cursor:grabbing;box-shadow:0 14px 36px rgba(21,101,192,.28);opacity:.98;pointer-events:none}
    .card-placeholder{border-radius:var(--radius);border:2px dashed var(--blue-soft);background:var(--blue-light);opacity:.55;transition:height .2s ease,margin .2s ease;box-sizing:border-box}
    .card-item .en{font-weight:700;font-size:.95rem;letter-spacing:-.01em}
    .card-item .de{color:var(--primary-dark);margin-top:6px;font-size:1rem;font-weight:500}
    .card-item.card-fill-dark .de{color:rgba(255,255,255,.92)}
    .card-item.card-fill-dark .card-meta{color:rgba(255,255,255,.75)}
    .card-item.card-fill-dark .card-actions button{color:rgba(255,255,255,.85)}
    .flip-face.flip-fill-dark{color:#fff}
    .card-actions{text-align:right;margin-top:8px}
    .card-actions button{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 8px}
    .cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)}
    .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .cal-header button{background:var(--surface-2);border:1px solid var(--border);color:var(--primary);width:38px;height:38px;border-radius:12px;cursor:pointer;font-size:1.1rem;transition:background .15s}
    .cal-header h2{font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:-.02em}
    .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:.68rem;font-weight:700;color:var(--muted);margin-bottom:6px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .cal-day{min-height:52px;border:1px solid var(--border);border-radius:12px;background:var(--surface-2);padding:4px;cursor:pointer;text-align:left;display:flex;flex-direction:column;transition:background .15s,box-shadow .15s}
    .cal-day.blank{border:none;background:transparent;cursor:default}
    .cal-day .num{font-size:.75rem;font-weight:600;padding:2px 4px}
    .cal-day.today{border-color:var(--primary);background:var(--primary-light)}
    .cal-day.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(91,94,247,.2);background:var(--surface)}
    .cal-day.overload{border-color:var(--danger);background:#fef2f2}
    .cal-day .sess{font-size:.6rem;background:var(--blue);color:#fff;border-radius:4px;padding:2px 4px;margin-top:auto;line-height:1.2}
    .cal-day .sess.manual{background:#64748b}
    .cal-day .sess.done{opacity:.45;text-decoration:line-through}
    .cal-legend{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0;font-size:.72rem;color:var(--muted)}
    .cal-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px}
    .day-panel{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:12px}
    .day-panel h3{font-size:.92rem;color:var(--blue-dark);margin-bottom:10px}
    .session-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.85rem}
    .session-row:last-child{border:none}
    .algo-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
    .algo-section h3{font-size:.92rem;color:var(--blue-dark);margin-bottom:12px}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:4px}
    .field input,.field textarea,.field select{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;font:inherit}
    .field small{display:block;color:var(--muted);font-size:.72rem;margin-top:4px;line-height:1.4}
    .formula{background:var(--blue-light);border-radius:10px;padding:12px;font-size:.78rem;color:var(--blue-dark);line-height:1.5;margin-top:8px;font-family:ui-monospace,monospace}
    .overload-box{background:#fff7ed;border:1px solid #fdba74;border-radius:var(--radius);padding:14px;margin-bottom:12px}
    .overload-box h3{color:#c2410c;font-size:.9rem;margin-bottom:6px}
    .flip-card{perspective:1200px;min-height:280px;margin:20px 0;cursor:pointer}
    .flip-inner{position:relative;height:280px;transition:transform .55s var(--ease);transform-style:preserve-3d}
    .flip-card.flipped .flip-inner{transform:rotateY(180deg)}
    .flip-face{
      position:absolute;inset:0;backface-visibility:hidden;border-radius:24px;
      display:flex;align-items:center;justify-content:center;padding:28px;text-align:center;
      font-size:1.35rem;font-weight:600;line-height:1.45;letter-spacing:-.02em;
      border:1px solid var(--border);box-shadow:var(--shadow-lg);
    }
    .flip-front{background:var(--surface)}
    .flip-back{background:linear-gradient(145deg,var(--primary-light),#fff);color:var(--primary-dark);transform:rotateY(180deg)}
    .progress-row{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-bottom:10px;font-weight:600}
    .progress-bar{height:8px;background:rgba(91,94,247,.12);border-radius:var(--radius-pill);margin-bottom:22px;overflow:hidden}
    .progress-bar>div{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:var(--radius-pill);transition:width .4s var(--ease)}
    .study-actions{display:flex;gap:12px}
    .study-actions button{flex:1;padding:16px;border-radius:var(--radius-sm);font-weight:700;font-size:.92rem;cursor:pointer;border:none;transition:transform .15s}
    .study-actions button:active{transform:scale(.97)}
    .missed{background:var(--surface);border:1.5px solid var(--border)!important;color:var(--text-soft)}
    .got-it{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 8px 20px rgba(91,94,247,.35)}
    .show-answer{width:100%;padding:16px;background:var(--surface);border:1.5px solid var(--blue-soft);color:var(--primary-dark);border-radius:var(--radius-sm);font-weight:700;font-size:.92rem;cursor:pointer;box-shadow:var(--shadow-sm)}
    .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:300;animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:var(--surface);border-radius:24px;padding:24px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);animation:modalIn .35s var(--ease);border:1px solid var(--glass-border)}
    @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
    .modal h2{margin-bottom:12px;color:var(--text);font-size:1.2rem;font-weight:800;letter-spacing:-.02em}
    .modal input,.modal textarea,.auth-panel input{
      width:100%;padding:13px 14px;margin-bottom:10px;border:1px solid var(--border);
      border-radius:var(--radius-sm);font:inherit;background:var(--surface-2);
      transition:border-color .15s,box-shadow .15s;
    }
    .modal input:focus,.modal textarea:focus,.auth-panel input:focus,.field input:focus,.field select:focus,.field textarea:focus{
      outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(91,94,247,.12);background:var(--surface);
    }
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}
    .modal-actions button{padding:11px 18px;border-radius:var(--radius-sm);border:none;font-weight:700;cursor:pointer;font-size:.88rem}
    .cancel{background:var(--surface-2);color:var(--muted)}
    .confirm{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 6px 16px rgba(91,94,247,.3)}
    .bottom-nav{
      position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
      width:calc(100% - 28px);max-width:452px;
      background:rgba(255,255,255,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.9);border-radius:26px;
      display:flex;padding:8px 10px calc(8px + env(safe-area-inset-bottom));
      z-index:20;box-shadow:0 16px 48px rgba(91,94,247,.18),0 4px 12px rgba(15,23,42,.06);
    }
    .bottom-nav button{
      flex:1;background:none;border:none;padding:10px 8px;color:var(--muted);
      font-size:.67rem;font-weight:700;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:5px;
      border-radius:18px;transition:all .25s var(--ease);position:relative;
    }
    .bottom-nav button.active{
      color:#fff;background:linear-gradient(135deg,var(--primary),var(--accent));
      box-shadow:0 8px 22px rgba(91,94,247,.38);transform:translateY(-1px);

    function bytesToB64(bytes) {
      return btoa(String.fromCharCode(...bytes));
    }

    function b64ToBytes(b64) {
      return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    }

    async function hashPassword(password, saltB64) {
      const enc = new TextEncoder();
      const salt = saltB64 ? b64ToBytes(saltB64) : crypto.getRandomValues(new Uint8Array(16));
      const key = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
      const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: 120000, hash: 'SHA-256' }, key, 256);
      return { hash: bytesToB64(new Uint8Array(bits)), salt: saltB64 || bytesToB64(salt) };
    }

    async function registerWithEmail(name, email, password) {
      const em = normalizeEmail(email);
      if (!em || !password || password.length < 8) {
        setAuthError('Use a valid email and password (8+ characters).');
        return;
      }
      state.authBusy = true;
      setAuthError('');
      if (state.ready) render();
      const db = getAccountsDb();
      if (Object.values(db.users).some(u => u.email === em)) {
        setAuthError('An account with this email already exists.');
        state.authBusy = false;
        return;
      }
      const { hash, salt } = await hashPassword(password);
      const id = `email_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      db.users[id] = {
        id, email: em, name: (name || em.split('@')[0]).trim(), provider: 'email',
        passwordHash: hash, salt, avatar: null, createdAt: new Date().toISOString(),
      };
      saveAccountsDb(db);
      await completeLogin({ id, email: em, name: db.users[id].name, provider: 'email', avatar: null });
      state.authBusy = false;
    }

    async function signInWithEmail(email, password) {
      state.authBusy = true;
      if (state.ready) render();
      const em = normalizeEmail(email);
      const db = getAccountsDb();
      const user = Object.values(db.users).find(u => u.email === em && u.provider === 'email');
      if (!user) {
        setAuthError('No account found for this email.');
        state.authBusy = false;
        return;
      }
      const { hash } = await hashPassword(password, user.salt);
      if (hash !== user.passwordHash) {
        setAuthError('Incorrect password.');
        state.authBusy = false;
        return;
      }
      await completeLogin({ id: user.id, email: user.email, name: user.name, provider: 'email', avatar: user.avatar });
      state.authBusy = false;
    }

    function handleGoogleCredential(response) {
      try {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        const em = normalizeEmail(payload.email);
        const id = `google_${payload.sub}`;
        const db = getAccountsDb();
        if (!db.users[id]) {
          db.users[id] = {
            id, email: em, name: payload.name || em.split('@')[0], provider: 'google',
            avatar: payload.picture || null, createdAt: new Date().toISOString(),
          };
        } else {
          db.users[id].name = payload.name || db.users[id].name;
          db.users[id].avatar = payload.picture || db.users[id].avatar;
        }
        saveAccountsDb(db);
        completeLogin({
          id, email: em, name: db.users[id].name, provider: 'google', avatar: db.users[id].avatar,
        }).then(() => { if (!state.splashDone) finishSplash(); });
      } catch (e) {
        setAuthError('Google sign-in failed. Try again.');
        render();
      }

    // ── Date helpers ──
    function todayStr() {
      const d = new Date();
      return fmt(d.getFullYear(), d.getMonth() + 1, d.getDate());
    }
    function fmt(y, m, d) { return `${y}-${pad(m)}-${pad(d)}`; }
    function pad(n) { return String(n).padStart(2, '0'); }
    function parseDate(s) { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }
    function addDaysStr(s, n) {
      const d = parseDate(s); d.setDate(d.getDate() + n);
      return fmt(d.getFullYear(), d.getMonth() + 1, d.getDate());
    }
    function formatDate(s) {
      return parseDate(s).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    // ── Deck model ──
    function newDeckSR() {
      return { repetitions: 0, ease: DEFAULT_ALGO.initialEase, stability: DEFAULT_ALGO.initialStability, intervalDays: 0, lastReview: null };
    }
    function newScheduleEntry(date, source = 'auto') {
      return { id: Date.now() + Math.random(), date, source, completed: false };

    function cardFront(c) { return c.front || c.en || ''; }
    function cardBack(c) { return c.back || c.de || ''; }

    function initCard(c) {
      return {
        id: c.id,
        front: cardFront(c),
        back: cardBack(c),
        en: cardFront(c),
        de: cardBack(c),
        color: c.color || null,
        leitnerBox: c.leitnerBox || 1,
        sm2: c.sm2 || { repetitions: 0, easeFactor: 2.5, intervalDays: 0 },
      };
    }

    function initCluster(c) {
      return { id: c.id, name: c.name || 'Cluster', emoji: c.emoji || '📁' };
    }

    function initDeck(d) {
      return {
        ...d,
        clusterId: d.clusterId ?? null,
        cards: (d.cards || []).map(initCard),
        sr: d.sr || newDeckSR(),
        schedule: d.schedule || [],
        ebbinghaus: d.ebbinghaus === true || (d.algo && d.algo.enabled === true),
        algo: { ...DEFAULT_ALGO, ...(d.algo || {}), enabled: d.ebbinghaus === true || (d.algo && d.algo.enabled === true) },
      };
    }

    function migrateLegacyClusters(decks, clusters) {
      if (Array.isArray(clusters) && clusters.length) return clusters.map(initCluster);
      const legacy = [{ id: 1, name: 'Languages', emoji: '🌍' }];
      decks.forEach(d => { if (d.clusterId == null) d.clusterId = 1; });
      return legacy.map(initCluster);
    }

    function loadSampleData() {
      state.clusters = SAMPLE_CLUSTERS.map(initCluster);
      state.decks = SAMPLE_DECKS.map(initDeck);
    }

    function load() {
      try {
        const key = activeStorageKey();
        let stored = localStorage.getItem(key);
        if (!stored && !state.auth.user) {
          for (const k of LEGACY_KEYS) {
            const legacy = localStorage.getItem(k);
            if (legacy) { stored = legacy; break; }
          }
        }
        const raw = JSON.parse(stored || 'null');
        if (raw && Array.isArray(raw.decks)) {
          applyAppData(raw);
        } else if (!state.auth.user && isOnboarded()) {
          state.decks = [];
          state.clusters = [];
        } else if (!state.auth.user && !isOnboarded()) {
          state.decks = [];
          state.clusters = [];
        } else if (!state.auth.user) {
          loadSampleData();
        } else {
          state.decks = [];
          state.clusters = [];
        }
        if (!state.auth.user && (raw || isOnboarded())) save();
      } catch (e) {
        console.warn('Load failed, using defaults', e);
        if (!state.auth.user) loadSampleData();
      }
    }
    function save() {
      persistAppData();
    }
    function clusterById(id) { return state.clusters.find(c => c.id === id); }
    function decksInCluster(clusterId) {
      return state.decks.filter(d => clusterId == null ? d.clusterId == null : d.clusterId === clusterId);
    }
    function deck() { return state.decks.find(d => d.id === state.deckId); }
    function deckAlgo(d) { return { ...state.algo, ...(d.algo || {}) }; }
    function nextId(items) { return items.length ? Math.max(...items.map(i => i.id)) + 1 : 1; }

    // ── Ebbinghaus full implementation ──
    // Retention R(t) = e^(-t / S)  where S = memory stability (days)
    function retentionAt(stability, daysSince) {
      return Math.exp(-daysSince / Math.max(stability, 0.1));
    }

    function intervalFromStability(S, algo) {
      // Find t where R(t) = retentionTarget: t = -S * ln(R)
      const t = -S * Math.log(Math.max(0.01, Math.min(0.99, algo.retentionTarget)));
      return Math.max(1, Math.round(t * algo.curveSteepness));
    }

    function getAlgorithm(d) {
      return deckAlgo(d).algorithm || 'ebbinghaus';
    }

    function computeEbbinghaus(deck, recallScore) {
      const algo = deckAlgo(deck);
      const sr = deck.sr;
      const passed = recallScore >= 0.6;
      if (!passed) {
        sr.repetitions = 0;
        sr.stability = Math.max(0.5, sr.stability * 0.5);
        sr.ease = Math.max(algo.minEase, sr.ease - algo.easePenalty);
        sr.intervalDays = algo.failIntervalDays;
      } else {
        const rep = sr.repetitions;
        if (rep < algo.intervals.length) sr.intervalDays = algo.intervals[rep];
        else sr.intervalDays = intervalFromStability(sr.stability, algo);
        sr.stability = sr.stability * (1 + sr.ease * recallScore);
        sr.ease = Math.min(algo.maxEase, sr.ease + algo.easeBonus * recallScore);
        sr.repetitions = rep + 1;
      }
      sr.lastReview = todayStr();
      return { nextDate: addDaysStr(todayStr(), sr.intervalDays), intervalDays: sr.intervalDays };
    }

    function leitnerDaysForBox(box) {
      return LEITNER_DAYS[Math.max(0, Math.min(4, (box || 1) - 1))];
    }

    function onCardLeitner(card, recalled) {
      card.leitnerBox = recalled ? Math.min(5, (card.leitnerBox || 1) + 1) : 1;
    }

    function onCardSM2(card, recalled) {
      const q = recalled ? 4 : 1;
      const sm = card.sm2 || { repetitions: 0, easeFactor: 2.5, intervalDays: 0 };
      if (q < 3) {
        sm.repetitions = 0;
        sm.intervalDays = 1;
      } else {
        if (sm.repetitions === 0) sm.intervalDays = 1;
        else if (sm.repetitions === 1) sm.intervalDays = 6;
        else sm.intervalDays = Math.round(sm.intervalDays * sm.easeFactor);
        sm.repetitions += 1;
        sm.easeFactor = Math.max(1.3, sm.easeFactor + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
      }
      card.sm2 = sm;
    }

    function computeLeitner(deck) {
      const boxes = deck.cards.map(c => c.leitnerBox || 1);
      const avg = boxes.reduce((a, b) => a + b, 0) / Math.max(1, boxes.length);
      const days = leitnerDaysForBox(Math.round(avg));
      deck.sr.intervalDays = days;
      deck.sr.lastReview = todayStr();
      return { nextDate: addDaysStr(todayStr(), days), intervalDays: days };
    }

    function computeSM2(deck) {
      const days = Math.max(1, ...deck.cards.map(c => c.sm2?.intervalDays || 1));
      deck.sr.intervalDays = days;
      deck.sr.lastReview = todayStr();
      return { nextDate: addDaysStr(todayStr(), days), intervalDays: days };
    }

    function computeNextReview(deck, recallScore) {
      const kind = getAlgorithm(deck);
      if (kind === 'leitner') return computeLeitner(deck);
      if (kind === 'sm2') return computeSM2(deck);
      return computeEbbinghaus(deck, recallScore);
    }

    function onCardReview(card, deck, recalled) {
      const kind = getAlgorithm(deck);
      if (kind === 'leitner') onCardLeitner(card, recalled);
      else if (kind === 'sm2') onCardSM2(card, recalled);
    }

    function fillLuminance(hex) {
      if (!hex || hex[0] !== '#') return 1;
      const n = hex.length === 4
        ? hex.slice(1).split('').map(ch => parseInt(ch + ch, 16))
        : [hex.slice(1, 3), hex.slice(3, 5), hex.slice(5, 7)].map(h => parseInt(h, 16));
      const [r, g, b] = n.map(v => {
        const c = v / 255;
        return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }

    function isDarkFill(hex) {
      return fillLuminance(hex) < 0.45;
    }

    function getCardColor(colorId) {
      return CARD_COLORS.find(x => x.id === colorId) || CARD_COLORS[0];
    }

    function cardColorStyle(colorId) {
      const c = getCardColor(colorId);
      if (!c.hex) return 'border-left:4px solid var(--border)';
      const dark = isDarkFill(c.hex);
      const text = dark ? ';color:#fff' : '';
      return `border-left:4px solid ${c.border};background:${c.hex}${text}`;
    }

    function cardColorClass(colorId) {
      const c = getCardColor(colorId);
      return c.hex && isDarkFill(c.hex) ? 'card-fill-dark' : '';
    }

    function flipColorStyle(colorId, face) {
      const c = getCardColor(colorId);
      if (!c.hex) return face === 'back' ? 'background:var(--blue-light)' : 'background:var(--white)';
      const dark = isDarkFill(c.hex);
      const text = dark ? ';color:#fff' : '';
      return `background:${c.hex};border:2px solid ${c.border}${text}`;
    }

    function flipColorClass(colorId) {
      const c = getCardColor(colorId);
      return c.hex && isDarkFill(c.hex) ? 'flip-fill-dark' : '';
    }

    function scheduleReview(deck, date, source = 'auto') {
      if (!deck.schedule) deck.schedule = [];
      deck.schedule.push(newScheduleEntry(date, source));
    }

    function sessionsOn(deck, date) {
      return (deck.schedule || []).filter(s => s.date === date && !s.completed);
    }

    function completedOn(deck, date) {
      return (deck.schedule || []).filter(s => s.date === date && s.completed);
    }

    function nextScheduled(deck) {
      const upcoming = (deck.schedule || []).filter(s => !s.completed).map(s => s.date).sort();
      return upcoming[0] || null;
    }

    function isDue(deck) {
      return sessionsOn(deck, todayStr()).length > 0;
    }

    function getOverloadDays(deck) {
      const algo = deckAlgo(deck);
      const counts = {};
      (deck.schedule || []).filter(s => !s.completed).forEach(s => {
        counts[s.date] = (counts[s.date] || 0) + 1;
      });
      return Object.entries(counts).filter(([, c]) => c > algo.maxSessionsPerDay).map(([date, count]) => ({ date, count }));
    }

    function spreadOverload(deck) {
      const algo = deckAlgo(deck);
      const byDate = {};
      (deck.schedule || []).filter(s => !s.completed).forEach(s => {
        if (!byDate[s.date]) byDate[s.date] = [];
        byDate[s.date].push(s);
      });
      Object.entries(byDate).forEach(([date, sessions]) => {
        if (sessions.length <= algo.maxSessionsPerDay) return;
        sessions.slice(algo.maxSessionsPerDay).forEach(sess => {
          for (let i = 1; i <= 60; i++) {
            const target = addDaysStr(date, i);
            if (sessionsOn(deck, target).length < algo.maxSessionsPerDay) {
              sess.date = target;
              break;
            }
          }
        });
      });
      save();
    }

    function clearDay(deck, date) {
      deck.schedule = (deck.schedule || []).filter(s => s.date !== date || s.completed);
      save();
    }

    function rescheduleDay(deck, fromDate, toDate) {
      sessionsOn(deck, fromDate).forEach(s => { s.date = toDate; });
      save();
    }

    function allSessionsOn(date) {
      const out = [];
      state.decks.forEach(d => {
        sessionsOn(d, date).forEach(s => out.push({ deck: d, session: s }));
      });
      return out;
    }

    function countSessionsOn(date) {
      return state.decks.reduce((n, d) => n + sessionsOn(d, date).length, 0);
    }

    function globalOverloadDays() {
      const counts = {};
      state.decks.forEach(d => {
        (d.schedule || []).filter(s => !s.completed).forEach(s => {
          counts[s.date] = (counts[s.date] || 0) + 1;
        });
      });
      const max = state.globalMaxSessionsPerDay;
      return Object.entries(counts).filter(([, c]) => c > max).map(([date, count]) => ({ date, count }));
    }

    function spreadGlobalOverload() {
      const max = state.globalMaxSessionsPerDay;
      globalOverloadDays().forEach(({ date }) => {
        const items = allSessionsOn(date);
        items.slice(max).forEach(({ deck, session }) => {
          for (let i = 1; i <= 60; i++) {
            const target = addDaysStr(date, i);
            if (countSessionsOn(target) < max) {
              session.date = target;
              break;
            }
          }
        });
      });
      save();
    }

    function clearGlobalDay(date) {
      state.decks.forEach(d => clearDay(d, date));
      save();
    }

    function deckById(id) { return state.decks.find(d => d.id === id); }

    function isSmartScheduleOn(d) { return !!(d.ebbinghaus || deckAlgo(d).enabled); }
    function isEbbinghausOn(d) { return isSmartScheduleOn(d); }

    function getDeckPreset(d) {
      const p = deckAlgo(d).preset;
      if (p && PRESETS[p]) return p;
      const r = deckAlgo(d).retentionTarget;
      if (r >= 0.93) return 'intensive';
      if (r <= 0.87) return 'relaxed';
      return 'normal';
    }

    function applyPreset(d, key) {
      const p = PRESETS[key];
      if (!p) return;
      const { label, desc, ...algoFields } = p;
      d.algo = { ...deckAlgo(d), ...algoFields, preset: key, enabled: isEbbinghausOn(d) };
      save();
    }

    function seedSmartSchedule(d) {
      if (!isSmartScheduleOn(d)) return;
      if (nextScheduled(d)) return;
      const today = todayStr();
      scheduleReview(d, today, 'auto');
      save();
    }

    function setScheduleMode(d, auto) {
      d.ebbinghaus = auto;
      const a = deckAlgo(d);
      d.algo = { ...a, enabled: auto };
      if (auto) {
        if (!a.preset) applyPreset(d, 'normal');
        seedSmartSchedule(d);
      } else save();
    }

    // ── Splash ──
    function finishSplash() {
      if (state.splashDone) return;
      state.splashDone = true;
      const splash = document.getElementById('splash');
      if (splash) splash.classList.add('hide');
      state.ready = true;
      try {
        if (!isOnboarded() && !state.auth.user) state.modal = { type: 'onboard' };
        render();
      } catch (e) {
        console.error(e);
        document.getElementById('app').innerHTML = '<main style="padding:24px"><h2>Something went wrong</h2><p>Please refresh the page.</p></main>';
      }
    }

    let splashSceneIndex = 0;

    function pickSplashScene(avoidIndex) {
      if (SPLASH_SCENES.length <= 1) return 0;
      let i;
      do { i = Math.floor(Math.random() * SPLASH_SCENES.length); }
      while (i === avoidIndex);
      return i;
    }

    function preloadSplashImage(url) {
      const img = new Image();
      img.src = url;
    }

    function applySplashScene(index) {
      const scene = SPLASH_SCENES[index];
      if (!scene) return;
      splashSceneIndex = index;
      try { localStorage.setItem(SPLASH_LAST_SCENE_KEY, String(index)); } catch (e) {}

      const photo = document.getElementById('splash-photo');
      const content = document.getElementById('splash-content');
      const nextIndex = pickSplashScene(index);
      preloadSplashImage(SPLASH_SCENES[nextIndex].image);

      if (photo) {
        photo.classList.remove('is-ready');
        photo.classList.add('is-loading');
        const img = new Image();
        img.onload = () => {
          photo.style.backgroundImage = `url("${scene.image}")`;
          photo.style.backgroundPosition = scene.position || 'center';
          photo.classList.remove('is-loading');
          photo.classList.add('is-ready');
        };
        img.onerror = () => {
          photo.style.backgroundImage = 'linear-gradient(145deg,#1e1b4b,#5b5ef7)';
          photo.classList.remove('is-loading');
          photo.classList.add('is-ready');
        };
        img.src = scene.image;
      }

      const hero = document.getElementById('splash-hero');
      const hook = document.getElementById('splash-hook');
      if (hook) hook.textContent = scene.hook;
      if (photo) photo.setAttribute('aria-label', `Shine — ${scene.hook}`);

      [hero, content].forEach((el) => {
        if (!el) return;
        el.classList.remove('splash-in');
        void el.offsetWidth;
        el.classList.add('splash-in');
      });
    }

    function cycleSplashScene() {
      applySplashScene(pickSplashScene(splashSceneIndex));
    }

    function startSplash() {
      let startIndex = pickSplashScene(-1);
      try {
        const saved = parseInt(localStorage.getItem(SPLASH_LAST_SCENE_KEY), 10);
        if (!Number.isNaN(saved) && saved >= 0 && saved < SPLASH_SCENES.length) {
          startIndex = pickSplashScene(saved);
        }
      } catch (e) {}
      applySplashScene(startIndex);

      const goGuest = (e) => { e?.preventDefault?.(); e?.stopPropagation?.(); finishSplash(); };
      window.finishSplash = finishSplash;
      document.getElementById('splash-begin')?.addEventListener('click', goGuest);
      document.getElementById('splash-continue')?.addEventListener('click', goGuest);
      document.getElementById('splash-refresh')?.addEventListener('click', (e) => {
        e.preventDefault();
        cycleSplashScene();
      });
      document.querySelector('#splash [data-google-oneclick]')?.addEventListener('click', (e) => {
        e.stopPropagation();
        triggerGoogleOneClick();
      });
    }

      const app = document.getElementById('app');

        else if (state.view === 'deck') app.innerHTML = renderDeck();
        else if (state.tab === 'calendar') app.innerHTML = renderGlobalCalendar();
        else if (state.tab === 'account') app.innerHTML = renderAccount();
        else app.innerHTML = renderHome();
        if (state.modal) app.innerHTML += renderModal();
        if (state.view === 'home' || state.view === 'deck') app.innerHTML += renderBottomNav();
        if (state.toast) app.innerHTML += `<div class="toast" role="status">${esc(state.toast)}</div>`;
        bind();
        if (state.tab === 'account') setTimeout(initGoogleButton, 50);
      } catch (e) {
        console.error('Render error', e);
        app.innerHTML = '<main style="padding:24px"><h2>Something went wrong</h2><p>Please refresh the page.</p></main>';
      }
    }

    function renderDeck() {
      const d = deck();
      if (!d) return '';
      const ebbOn = isEbbinghausOn(d);
      const cl = clusterById(d.clusterId);

    function renderColorPicker(selected) {

    function shuffleArray(items) {
      const a = [...items];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function shuffleDeck(d) {
      d.cards = shuffleArray(d.cards);
      save();
    }

    function syncCardOrderFromDom() {
      const list = document.getElementById('card-list');
      const d = deck();
      if (!list || !d) return;
      const order = [...list.querySelectorAll('.card-item')].map(el => +el.dataset.cardId);
      d.cards.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
      save();
    }

    function flipReorder(list, mutate) {
      const nodes = [...list.children];
      const tops = new Map(nodes.map(c => [c, c.getBoundingClientRect().top]));
      mutate();
      nodes.forEach(c => {
        if (!list.contains(c)) return;
        const dy = tops.get(c) - c.getBoundingClientRect().top;
        if (!dy) return;
        c.style.transition = 'none';
        c.style.transform = `translateY(${dy}px)`;
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            c.style.transition = '';
            c.style.transform = '';
          });
        });
      });
    }

    function placeholderTarget(list, placeholder, clientY) {
      const siblings = [...list.children].filter(c => c !== placeholder);
      for (const sib of siblings) {
        const rect = sib.getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) return sib;
      }
      return null;
    }

    function movePlaceholder(list, placeholder, clientY) {
      const target = placeholderTarget(list, placeholder, clientY);
      if (target) {
        if (placeholder.nextElementSibling === target) return;
        flipReorder(list, () => list.insertBefore(placeholder, target));
      } else if (placeholder !== list.lastElementChild) {
        flipReorder(list, () => list.appendChild(placeholder));
      }
    }

    function clearDragStyles(item) {
      item.classList.remove('drag-lifted');
      ['position', 'left', 'top', 'width', 'margin', 'zIndex', 'transition', 'transform'].forEach(k => { item.style[k] = ''; });
    }

    function bindCardReorder() {
      const list = document.getElementById('card-list');
      if (!list) return;

      let drag = null;

      const cleanupListeners = () => {
        document.removeEventListener('pointermove', onPointerMove);
        document.removeEventListener('pointerup', endDrag);
        document.removeEventListener('pointercancel', endDrag);
      };

      const finishDrop = () => {
        if (!drag) return;
        const { item, list, placeholder, moved } = drag;
        list.classList.remove('is-dragging');
        cleanupListeners();

        if (!moved) {
          if (placeholder) placeholder.remove();
          if (item.parentElement === document.body) list.appendChild(item);
          clearDragStyles(item);
          drag = null;
          return;
        }

        const targetTop = placeholder.getBoundingClientRect().top;
        item.style.transition = 'top .22s cubic-bezier(.2,.8,.2,1), box-shadow .22s ease';
        item.style.top = `${targetTop}px`;

        let settled = false;
        const settle = () => {
          if (settled) return;
          settled = true;
          list.insertBefore(item, placeholder);
          placeholder.remove();
          clearDragStyles(item);
          syncCardOrderFromDom();
          drag = null;
        };

        const onDone = (ev) => {
          if (ev.propertyName !== 'top') return;
          item.removeEventListener('transitionend', onDone);
          settle();
        };
        item.addEventListener('transitionend', onDone);
        setTimeout(settle, 280);
      };

      const endDrag = (e) => {
        if (!drag) return;
        if (e && e.pointerId != null && e.pointerId !== drag.pointerId) return;
        finishDrop();
      };

      const onPointerMove = (e) => {
        if (!drag || e.pointerId !== drag.pointerId) return;
        if (!drag.moved && Math.abs(e.clientY - drag.startY) < 6) return;

        if (!drag.moved) {
          drag.moved = true;
          const { item, list } = drag;
          const rect = item.getBoundingClientRect();
          const placeholder = document.createElement('div');
          placeholder.className = 'card-placeholder';
          placeholder.style.height = `${rect.height}px`;
          list.insertBefore(placeholder, item);
          drag.placeholder = placeholder;
          list.classList.add('is-dragging');
          item.classList.add('drag-lifted');
          document.body.appendChild(item);
          Object.assign(item.style, {
            position: 'fixed',
            left: `${rect.left}px`,
            top: `${rect.top}px`,
            width: `${rect.width}px`,
            margin: '0',
            zIndex: '1000',
          });
        }

        e.preventDefault();
        drag.item.style.top = `${e.clientY - drag.offsetY}px`;
        movePlaceholder(drag.list, drag.placeholder, e.clientY);
      };

      list.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 && e.pointerType === 'mouse') return;
        if (e.target.closest('.card-actions') || e.target.closest('button')) return;
        const item = e.target.closest('.card-item');
        if (!item || !list.contains(item)) return;

        const rect = item.getBoundingClientRect();
        drag = {
          item,
          list,
          placeholder: null,
          pointerId: e.pointerId,
          startY: e.clientY,
          offsetY: e.clientY - rect.top,
          moved: false,
        };

        document.addEventListener('pointermove', onPointerMove, { passive: false });
        document.addEventListener('pointerup', endDrag);
        document.addEventListener('pointercancel', endDrag);
      });
    }

    function renderDeckCards(d) {
      const alg = getAlgorithm(d);
      const cards = d.cards.map(c => `
        <div class="card-item ${cardColorClass(c.color)}" style="${cardColorStyle(c.color)}" data-card-id="${c.id}">
          <div class="en">${esc(cardFront(c))}</div>
          <div class="de">${esc(cardBack(c))}</div>
          ${isSmartScheduleOn(d) && alg === 'leitner' ? `<div class="card-meta">Leitner box ${c.leitnerBox || 1} · next in ${leitnerDaysForBox(c.leitnerBox)}d</div>` : ''}
          ${isSmartScheduleOn(d) && alg === 'sm2' ? `<div class="card-meta">SM-2 · ${c.sm2?.intervalDays || 0}d interval · ease ${(c.sm2?.easeFactor || 2.5).toFixed(1)}</div>` : ''}
          <div class="card-actions">
            <button data-edit-card="${c.id}">Edit</button>
            <button data-del-card="${c.id}" style="color:var(--danger)">Delete</button>
          </div>
        </div>`).join('');
      return `
        ${d.cards.length ? `<div class="deck-toolbar">
          <button class="btn-primary" data-study-now>Study now (${d.cards.length} cards)</button>
          <button type="button" class="btn-outline btn-shuffle" data-shuffle-deck>🔀 Shuffle cards</button>
        </div>` : ''}
        ${cards ? `<div class="card-list" id="card-list">${cards}</div>` : '<div class="empty"><div class="empty-icon">🃏</div><p>No cards yet — tap + to add your first one</p></div>'}`;
    }

    function renderStudy() {
      const s = state.study;
      if (!s) return '';
      const d = deck();
      if (s.done) {
        const total = s.correct + s.incorrect;
        const score = total ? s.correct / total : 0;
        const pct = Math.round(score * 100);
        return `
          ${renderPageHeader({ title: 'Session complete', subtitle: esc(d.name), backAction: 'end-study' })}
          <main style="text-align:center;padding-top:12px">
            <div class="study-result">
              <div class="score">${pct}%</div>
              <p class="stats">Got it ${s.correct} · Missed ${s.incorrect}</p>
            </div>
            ${isSmartScheduleOn(d)
              ? `<p style="color:var(--muted);margin-bottom:20px;line-height:1.5">${ALGORITHMS[getAlgorithm(d)].label} scheduled your next review in <strong>${d.sr.intervalDays} day(s)</strong>.</p>`
              : '<p style="color:var(--muted);margin-bottom:20px;line-height:1.5">Add your next study day on the <strong>Calendar</strong> tab.</p>'}
            <button class="btn-primary" data-end-study>Back to deck</button>
          </main>`;
      }
      const c = s.cards[s.index];
      const prog = ((s.index + (s.flipped ? .5 : 0)) / s.cards.length) * 100;
      return `
        ${renderPageHeader({ title: 'Review', subtitle: `${s.index + 1} of ${s.cards.length}`, backAction: 'end-study' })}
        <main>
          <div class="progress-row"><span>Card ${s.index + 1}</span><span>${s.flipped ? 'Answer' : 'Question'}</span></div>
          <div class="progress-bar"><div style="width:${prog}%"></div></div>
          <div class="flip-card ${s.flipped?'flipped':''}" data-flip>
            <div class="flip-inner">
              <div class="flip-face flip-front ${flipColorClass(c.color)}" style="${flipColorStyle(c.color,'front')}">${esc(cardFront(c))}</div>
              <div class="flip-face flip-back ${flipColorClass(c.color)}" style="${flipColorStyle(c.color,'back')}">${esc(cardBack(c))}</div>
            </div>
          </div>
          ${s.flipped ? `<div class="study-actions">
            <button class="missed" data-ans="0">Missed</button>
            <button class="got-it" data-ans="1">Got it</button>
          </div>` : `<button class="show-answer" data-flip>Show answer</button>`}
        </main>`;
    }

    function renderModal() {

        <div class="modal-actions"><button class="cancel" data-close>Cancel</button><button class="confirm" data-save-card>Save</button></div>
      </div></div>`;
      return '';
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

    function startStudy(d) {
      state.study = { cards: [...d.cards].sort(() => Math.random() - .5), index: 0, flipped: false, correct: 0, incorrect: 0, done: false };
      state.view = 'study';
      render();
    }

    function finishStudy() {
      const s = state.study;
      const d = deck();
      if (!s || !d) return;
      const total = s.correct + s.incorrect;
      const score = total ? s.correct / total : 0.5;
      const today = todayStr();

      sessionsOn(d, today).forEach(sess => { sess.completed = true; });

      if (isSmartScheduleOn(d)) {
        const { nextDate } = computeNextReview(d, score);
        scheduleReview(d, nextDate, 'auto');
      }
      save();
    }

      document.querySelectorAll('[data-add-deck-cluster]').forEach(el => el.addEventListener('click', e => {

        if (cl) state.modal = { type: 'cluster', edit: cl.id, name: cl.name, emoji: cl.emoji };
        render();
      }));

      document.querySelectorAll('[data-pick-color]').forEach(el => el.addEventListener('click', () => {
        const inp = document.getElementById('m-color');
        if (inp) inp.value = el.dataset.pickColor;
        document.querySelectorAll('[data-pick-color]').forEach(s => s.classList.toggle('active', s.dataset.pickColor === el.dataset.pickColor));
      }));
      document.querySelector('[data-cal-prev]')?.addEventListener('click', () => {
        state.calMonth = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth() - 1, 1); render();
      });
      document.querySelector('[data-cal-next]')?.addEventListener('click', () => {
        state.calMonth = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth() + 1, 1); render();
      });
      document.querySelectorAll('[data-pick-day]').forEach(el => el.addEventListener('click', () => {
        state.calSelected = el.dataset.pickDay; render();
      }));
      document.querySelectorAll('[data-add-global-session]').forEach(el => el.addEventListener('click', () => {
        const deckId = parseInt(document.getElementById('sched-deck')?.value, 10);
        const d = deckById(deckId);
        if (!d) return;
        scheduleReview(d, el.dataset.addGlobalSession, 'manual');
        save(); render();
      }));
      document.querySelectorAll('[data-rm-session]').forEach(el => el.addEventListener('click', () => {
        const id = +el.dataset.rmSession;
        const d = deckById(+el.dataset.rmDeck) || deck();
        if (d) { d.schedule = d.schedule.filter(s => s.id !== id); save(); render(); }
      }));
      document.querySelectorAll('[data-clear-global]').forEach(el => el.addEventListener('click', () => {
        if (confirm('Remove all deck sessions on this day?')) { clearGlobalDay(el.dataset.clearGlobal); render(); }
      }));
      document.querySelector('[data-spread-global]')?.addEventListener('click', () => { spreadGlobalOverload(); render(); });
      document.querySelector('[data-max-inc]')?.addEventListener('click', () => {
        state.globalMaxSessionsPerDay = Math.min(10, state.globalMaxSessionsPerDay + 1);
        save(); render();
      });
      document.querySelector('[data-max-dec]')?.addEventListener('click', () => {
        state.globalMaxSessionsPerDay = Math.max(1, state.globalMaxSessionsPerDay - 1);
        save(); render();
      });
      document.querySelectorAll('[data-start-deck]').forEach(el => el.addEventListener('click', () => {
        const d = deckById(+el.dataset.startDeck);
        if (d) { state.deckId = d.id; startStudy(d); }
      }));
      document.querySelector('[data-study-now]')?.addEventListener('click', () => startStudy(deck()));
      document.querySelector('[data-shuffle-deck]')?.addEventListener('click', () => {
        shuffleDeck(deck());
        render();
      });
      bindCardReorder();
      document.querySelectorAll('[data-end-study]').forEach(el => el.addEventListener('click', () => {
        const s = state.study;
        if (s && !s.done && (s.correct + s.incorrect) > 0) {
          if (!confirm('End session early? Your progress will be saved.')) return;
          if (!s.applied) { finishStudy(); s.applied = true; }
        }
        state.study = null;
        state.view = 'deck';
        render();
      }));
      document.querySelector('[data-save-advanced]')?.addEventListener('click', () => {
        state.deckScheduleOpen = true;
        const d = deck();
        const intervals = document.getElementById('a-intervals').value.split(',').map(s => parseInt(s.trim(), 10)).filter(n => n > 0);
        d.algo = {
          ...deckAlgo(d),
          intervals: intervals.length ? intervals : deckAlgo(d).intervals,
          failIntervalDays: parseInt(document.getElementById('a-fail').value, 10) || 1,
          enabled: true,
        };
        save(); render();
      });
      document.querySelectorAll('[data-edit-card]').forEach(el => el.addEventListener('click', () => {
        const c = deck().cards.find(x => x.id === +el.dataset.editCard);
        state.modal = { type: 'card', edit: c.id, front: cardFront(c), back: cardBack(c), color: c.color || 'none' }; render();
      }));
      document.querySelectorAll('[data-del-card]').forEach(el => el.addEventListener('click', () => {
        if (confirm('Delete card?')) { deck().cards = deck().cards.filter(c => c.id !== +el.dataset.delCard); save(); render(); }
      }));
      document.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => { state.modal = null; render(); }));
      document.querySelector('[data-save-welcome]')?.addEventListener('click', () => {
        const n = document.getElementById('welcome-name').value.trim();
        if (n) {
          state.userName = n;
          try { localStorage.setItem('shine_user', n); } catch (_) {}
        }
        state.modal = null; render();
      });
      document.querySelector('[data-save-cluster]')?.addEventListener('click', () => {
        const name = document.getElementById('m-cluster-name').value.trim();
        if (!name) return;
        const emoji = document.getElementById('m-cluster-emoji').value.trim() || '📁';
        if (state.modal.edit) {
          const cl = clusterById(state.modal.edit);
          if (cl) { cl.name = name; cl.emoji = emoji; }
        } else {
          state.clusters.push(initCluster({ id: nextId(state.clusters), name, emoji }));
        }
        save(); state.modal = null; render();
      });
      document.querySelector('[data-save-deck]')?.addEventListener('click', () => {
        const name = document.getElementById('m-name').value.trim();
        if (!name) return;
        const desc = document.getElementById('m-desc').value.trim();
        const clusterVal = document.getElementById('m-cluster')?.value;
        const clusterId = clusterVal ? parseInt(clusterVal, 10) : null;
        state.decks.unshift(initDeck({ id: nextId(state.decks), name, description: desc, clusterId, cards: [] }));
        save(); state.modal = null; render();
      });
      document.querySelector('[data-save-card]')?.addEventListener('click', () => {
        const front = document.getElementById('m-front').value.trim();
        const back = document.getElementById('m-back').value.trim();
        if (!front || !back) return;
        const d = deck();
        const colorVal = document.getElementById('m-color')?.value || 'none';
        const color = colorVal === 'none' ? null : colorVal;
        if (state.modal.edit) {
          const c = d.cards.find(x => x.id === state.modal.edit);
          Object.assign(c, initCard({ ...c, front, back, color }));
        } else {
          d.cards.push(initCard({ id: nextId(d.cards), front, back, color }));
        }
        save(); state.modal = null; render();
      });
      const flip = () => { if (state.study && !state.study.done) { state.study.flipped = !state.study.flipped; render(); } };
      document.querySelector('[data-flip]')?.addEventListener('click', flip);
      document.querySelectorAll('[data-ans]').forEach(el => el.addEventListener('click', () => {
        const ok = el.dataset.ans === '1';
        const d = deck();
        const cardRef = state.study.cards[state.study.index];
        const real = d?.cards.find(c => c.id === cardRef.id);
        if (real && d) onCardReview(real, d, ok);
        if (ok) state.study.correct++; else state.study.incorrect++;
        state.study.flipped = false;
        if (state.study.index + 1 >= state.study.cards.length) {
          state.study.done = true;
          if (!state.study.applied) { finishStudy(); state.study.applied = true; }
        } else state.study.index++;
        render();
      }));
    }

    window.addEventListener('storage', (e) => {
      if (!state.ready) return;
      const key = activeStorageKey();
      if (e.key === key || e.key === SESSION_KEY) {
        if (e.key === SESSION_KEY) state.auth.user = loadSession();
        load();
        render();
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then((regs) => Promise.all(regs.map((r) => r.unregister())))
        .then(() => navigator.serviceWorker.register('sw.js?v=3'))
        .catch(() => {});
    }

    startSplash();
    load();
  </script>
</body>
</html>
