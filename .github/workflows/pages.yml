name: Deploy Shine web app

on:
  push:
    branches: [main]
    paths:
      - 'flashcards/web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare web config
        run: |
          cp flashcards/web/auth-config.example.js flashcards/web/auth-config.js
          # peaceiris skips gitignored files; allow auth-config.js in the gh-pages commit
          sed -i '/^auth-config\.js$/d' flashcards/web/.gitignore

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./flashcards/web
          force_orphan: true
